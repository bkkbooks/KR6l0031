  - {type: variant, offset: 9149, length: 1, content: 者, 宋: 者謂於永離欲界染時應知頓得欲色無覆理不應得欲無覆心初入定時如應別得色無色善初入離生證阿羅漢時得學無學理亦應得欲界善心, 元: 者謂於永離欲界染時應知頓得欲色無覆理不應得欲無覆心初入定時如應別得色無色善初入離生證阿羅漢時得學無學理亦應得欲界善心, 明: 者謂於永離欲界染時應知頓得欲色無覆理不應得欲無覆心初入定時如應別得色無色善初入離生證阿羅漢時得學無學理亦應得欲界善心, 宮: 者謂於永離欲界染時應知頓得欲色無覆理不應得欲無覆心初入定時如應別得色無色善初入離生證阿羅漢時得學無學理亦應得欲界善心}
