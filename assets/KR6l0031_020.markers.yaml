  - {type: variant, offset: 9155, length: 59, content: 善根時、得欲界善離欲染時，應知頓得欲色無覆。初入定時，如應別得色無色善。初入離生位、證阿羅漢時，得學無學。若爾，何故言得六心？如經主難，應言, 宋: 諸善本雖加欲善除無覆心經主不應難令, 元: 諸善本雖加欲善除無覆心經主不應難令, 明: 諸善本雖加欲善除無覆心經主不應難令, 宮: 諸善本雖加欲善除無覆心經主不應難令}
