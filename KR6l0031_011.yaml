body:
  text: 尊者衆賢造三藏法師玄奘奉詔譯辨差別品第二之三作意別有亦如經説心由作意引發故生故此定應是大地法然上座言無別一法名為作意由此別相理不成故謂於所緣能作動意名作意相若於所緣唯作動意諸餘心所應不能緣若亦由斯方能緣者理不應爾名作意故餘緣生故此難非理諸心所法依心轉故但動於意餘動亦成故無心所不能緣過又衆緣力諸法乃生故雖餘緣生心心所而此作意非無力用謂此作意力能令識於餘境轉若爾一境識流轉時應無作意是則作意非大地法不爾一境識流轉時亦有作意然於餘境此用明了謂於一境剎那剎那亦由作意力方引心令起然於餘境引發心時作意功能明顯易了豈不衆緣發生心等即名能引何勞別計作意力為此責非理雖具生識餘和合緣而説作意能生識故如契經説爾時若無能生作意正現在前識終不起理亦應爾雖多境界俱時現前而識何因唯緣一起豈不於此生緣合故誠如所言此即作意生緣合者即世尊言作意爾時正現前義所言作意於境引心為是前生為是俱起是俱時起非謂前生經言作意正現前故正現前者謂正起近現前自境即正生時將入現在取自境義此中意顯由作意力引識令緣自所樂境勝解別有亦如經説心由勝解印可所緣諸心起時皆能印境故此定應是大地法然上座言勝解別有理不成立見此與智相無別故謂於所緣令心決定名勝解相此與智相都無差別是故定應無別勝解此言非理要有印可方決定故有言勝解是決定者於決定因説為決定若爾此二應不同時不爾此二相隨順故謂由簡擇隨生印可復由印可隨生決定不相違故同時無失若一切心皆有此二則諸心品應皆印決此難非理以或有時餘法所伏功能被損雖有印決劣難知故諸無色法就用説增如前已辨世尊建立貪瞋癡等行相異故又別説有十無學支故知非無別勝解體彼謂此中心離貪軛相續轉故即隨縛斷名正解脫所以者何以薄伽梵於餘經中自決此義故餘經説云何名為心善解脫謂心從貪從瞋從癡離染解脫云何名為慧善解脫謂如實知心從貪等離染解脫此言非善以無體法為無學支理不成故彼無少法名隨縛斷如何可立為無學支又彼釋言即隨縛斷名正解脫此不成釋所以者何由隨縛斷解脫生故離染無為名隨縛斷無學勝解名正解脫若不爾者前離染言已顯縛斷後解脫言應成無用言如實知心解脫者見離染心相應解脫又如實知解脫心者謂見解脫相應之心故餘契經世尊自説心離染故便得解脫若不爾者解脫既是離染異名應依初説不依第五如餘處言盡離滅等雖依初説離染解脫而體各異若不爾者説解脫言應成無用如無染離染義無差別故又説解脫為對治故非隨縛斷即是解脫故契經説折伏法中言由正解脫折伏邪解脫非隨縛斷能為對治若能印可是勝解相此與信欲應無差別相雖少同而體甚異謂審印可是勝解相心淨希求是信欲相豈不信順及與欲樂即印可耶信順欲樂隨順印可非即印可信欲助成勝解用故心所相用極難辨析唯審睿覺能分別知故譬喻師不能堪忍分析勞倦遂總非撥三摩地別有亦如契經説平等持心令住自境名三摩地諸心起時無不各住自所取境故此定應是大地法然上座言離心無別三摩地體由即心體緣境生時不流散故若三摩地持心令住一境轉者豈由三摩地無故心便於多境轉耶若謂多心由此持故令於一境無間轉者則不應説剎那剎那有三摩地心唯一念墮在境中此應非有如是此應非大地法若由有此心住所緣是則此體應非現見然諸心所體可現見又法功能不待餘法故心住境自力非餘此言非理令心造作亦應無別大地法思差別因緣不可得故又識非住所緣為性慧等亦同心有定非定故又諸心所體現見言如前已破前如何破謂若心所現可見者應無有執彼即是心又法功能必待餘法或應緣起言成無義又心所用不應在心心心所法性各別故三摩地用謂能住心了別所緣是識功用如自體起必託所緣亦非自能住境不散設住境用依心體成如令心造作別有體義立又阿笈摩證三摩地實有別體如契經説應修二法謂奢摩他毗鉢舍那若撥無實三摩地者便違此等無量契經若謂無違於心心所分位差別立此用故即心心所差別轉時立三摩地名用無失此亦不然於餘法體立餘法用理不成故又不應言三摩地用於彼一切差別位立唯依於心而説此故又彼宗義心心所法不同時起有何定準説心定時受等亦定若謂如無別相應體而説相應此亦應爾謂如無別相應法體而彼心等總名相應如是雖無別三摩地而心心所總説為定理亦不然是彼性故謂心心所是相應性非等持性所以者何一切位中彼相應性無勝劣故三摩地性於諸位中有勝劣故此既一相諸位何緣勝劣有別餘法所持令此功力有損益故現見青等餘色所糅相續隨流勝劣有別又若無定心自住者應無貪等心自染等豈不如無別法助故慧自簡擇如是亦無別法助故心自住境此例不齊以契經説心如電光亦如猿猴非住相故又三摩地體即心者想等亦應無別有性即心能取名相施設應説為想即心領納違等所緣應説為受即心造作善惡等業應説為思是則唯心應無三所又見諦者於並生疑故三摩地非心位別如契經説大德世尊我若在定心則解脫非不在定為先有定後方解脫廣説如經彼執解脫亦心位別或説無學心為解脫支故必無二心一身並起故彼於並不應生疑是故定應別有心所是心住因名三摩地故受等十別有實體一切心俱名大地法如是已説十大地法大善之地名大善地此中若法大善地所有名大善地法謂法恆於諸善心有彼法是何頌曰信及不放逸輕安捨慚愧二根及不害勤唯遍善心論曰心濁相違現前忍許無倒因果各別相屬為欲所依能資勝解説名為信專於己利防身語意放逸相違名不放逸正作意轉身心輕利安適之因心堪任性説名輕安心平等性説名為捨掉舉相違如理所引令心不越是為捨義趣向如理自法二種增上所生違愛等流心自在性説名為慚愛樂修習功德為先違癡等流厭惡劣法説名為愧有説怖畏謫罰惡趣自他謗因説名為愧二根者謂無貪無瞋已得未得境界耽著希求相違無愛染性名為無貪於情非情無恚害意哀愍種子説名無瞋與樂損惱有情相違心賢善性説名不害於諸已生功德過失守護棄捨於諸未生功德過失令生不生心無墮性説名為勤由有此故心於如理所作事業堅進不息有作是言此中既説身輕安故非唯心所説名輕安此言非理受等亦應同此説故然五識身相應諸受説名身受有作是説設有輕安體非心所然此中説心所法故不應説彼以能隨順覺支體故亦名覺支謂身輕安能引覺支心輕安故亦見餘處瞋及瞋因名瞋恚蓋見思惟勤名為慧蘊雖彼瞋因思惟及勤非瞋非慧然順彼故亦得彼名此亦應爾捨後當辨説二及言兼攝欣厭厭謂善心審觀無量過患法性此增上力所起順無貪心厭背性與此相應名厭作意欣謂善心希求過患出離對治此增上力所起順證修心欣尚性此於離喜未至等地亦有現行故非喜受與此相應名欣作意此二行相更互相違故一心中無容並起是故此中不正顯説大善地法性不成故亦有喜根厭行俱轉定無有欣厭行俱轉為表此二定不俱行説二及言行相違故如是已説大善地法大煩惱之地名大煩惱地此中若法大煩惱地所有名大煩惱地法謂法恆於染污心有彼法是何頌曰癡逸怠不信惛掉恆唯染論曰云何如是六種名大煩惱地法以恆唯與諸染心俱頌言染者是染心義又放逸等及與無明如其次第應知即是前不放逸勤信輕安捨等所治癡謂愚癡於所知境障如理解無辨了相説名愚癡即是無明無智無顯逸謂放逸於專己利棄捨縱情名為放逸怠謂懈怠於善事業闕減勝能於惡事業順成勇悍無明等流名為懈怠由此説為鄙劣勤性勤習鄙穢故名懈怠不信者謂心不澄淨邪見等流於諸諦寶靜慮等至現前輕毀於施等因及於彼果心不現許名為不信惛謂惛沈𧄼瞢不樂等所生心重性説名昏沈由斯覆蔽心便惛昧無所堪任瞢憒性故由是説為輕安所治心為大種能生因故由此為先起身重性假説惛沈實非惛沈彼是身識所緣境故然此惛沈無明覆故本論不説為大煩惱地法有言彼論説無明名唯目惛沈相相似故無明性是大遍行故是此地法不説而成有説此名總目二義掉謂掉舉親里尋等所生令心不寂靜性説名掉舉心與此合越路而行非理作意失念心亂不正知邪勝解前已説在大地法中故此地法中雖有而不説如於大善地法不説無癡善根唯諸染心恆有此六如是已説大煩惱地法大不善之地名大不善地此中若法大不善地所有名大不善地法謂法恆於不善心有彼法是何頌曰唯遍不善心無慚及無愧論曰唯二心所但與一切不善心俱謂無慚愧故唯二種名此地法此二法相如後頌中自當顯示故此不説如是已説大不善地法小煩惱之地名小煩惱地此中若法小煩惱地所有名小煩惱地法謂法少分染污心俱彼法是何頌曰忿覆慳嫉惱害恨諂誑憍如是類名為小煩惱地法論曰類言為攝不忍不樂憤發等義小是少義顯非一切染污心有非雖少分染污心俱仍各別起無相應義唯修所斷意識俱起無明相應此諸法相隨煩惱中當廣分別如前所説一切心所應知其性皆是實有所以者何非一品類所緣義中種種行相俱時起故一體同時如所緣義差別行相無容有故然由餘法所制伏故見其相續變異而起現見清油垢水風等勢力制持燈相續中便有明昧聲動等故如是已説大地法等品類決定心所差別復有此餘不定心所惡作睡眠尋伺等類總説名為不定地法今應決判一切心所諸心品中俱生數量何心品中有幾心所頌曰欲有尋伺故於善心品中二十二心所有時增惡作於不善不共見俱唯二十四煩惱忿等惡作二十一有覆有十八無覆許十二睡眠遍不違若有皆增一論曰且欲界中心品有五謂善唯一不善有二謂不共無明俱生及餘煩惱等俱生無記有二謂有覆無記及無覆無記如是欲界一切心品決定恆與尋伺相應故善心品有二十二心所俱生謂十大地法十大善地法及不定二謂尋與伺此中勤捨應不俱生行相違故如進與止造修委棄理不同時契經亦遮此二俱起説修二法時非時故如契經説心若惛沈爾時應修擇法勤喜修輕安定捨則為非時心若掉舉爾時應修輕安定捨修擇法勤喜則為非時俱生無失不相違故住正理者起如理行不息名勤即於爾時棄非理行平等名捨又於如理非理行中捨如持稱進止平等故捨與勤更相隨順起善止惡行不相違若於所緣一取一捨更相違背可有此失由斯類釋經主所難謂有警覺無警覺性作意與捨應互相違如是善成於善心品有二十二心所俱生不定地法所餘二種惡作睡眠非通三界及六識身有漏無漏非唯不染亦非唯染故善心品非一切時皆有惡作但可容有有時增數至二十三言惡作者悔以惡作為所緣故立惡作名如無想定有説無相及身念住有處名身若爾有緣所未作事心生追悔應非惡作不爾未作亦名作故如追悔言我先不作如是事業是我惡作然此惡作通善不善不通無記隨憂行故離欲貪者不成就故非無記法有如是事然有追變我頃何為不消而食我頃何為不畫此壁如是等類彼心乃至未觸憂根但是省察未起惡作若觸憂根便起惡作爾時惡作理同憂根故説惡作有如是相謂令心戚惡作心品若離憂根誰令心戚惡作有四謂善不善一一皆依二處起故若於不善不共心品有二十種心所俱生謂十大地法六大煩惱地法二大不善地法并二不定謂尋與伺何等名為不共心品謂此心品唯有無明無有所餘貪隨眠等如不共品邪見見取及戒禁取俱生亦爾大地法中即慧差別説名為見故數不增頌言唯者是簡別義謂唯見俱定有二十表不共品中容有惡作等謂若惡作是不善者唯無明俱非餘煩惱貪慢二種欣行轉故瞋外門轉行相麁故非惡作俱疑不決定惡作決定故不俱起有身見等欣行轉故極猛利故惡作不爾然此惡作依善惡行事處轉故諸見不爾故不相應邪見一分雖戚行轉而二因故非惡作俱是故惡作是不善者唯無明俱容在不共忿等亦爾於四不善貪瞋慢疑煩惱心品有二十一心所俱生二十如不共加貪等隨一於前所説忿等相應隨煩惱品亦二十一心所俱生二十如不共加忿等隨一不善惡作相應心品亦二十一心所俱生謂即惡作等二十一若於無記有覆心品唯有十八心所俱生謂如不共二十法中除大不善地法二種欲界無記有覆心者謂與薩迦耶見及邊執見相應不增見義如前應釋於餘無記無覆心品許唯十二心所俱生謂十大地法并不定尋伺有執惡作亦通無記憂如喜根非唯有記此相應品便有十三心所俱起睡眠一切不相違故於諸心品皆可現行於善不善無記心品隨何品有即説此增隨其所應各增一數工巧處等諸無記心似有勇悍然非稱理而起加行故無有勤又非染污故無懈怠無信不信類此應知已説欲界心所俱生諸品定量當説上界頌曰初定除不善及惡作睡眠中定又除尋上兼除伺等論曰初靜慮中於前所説諸心所法除唯不善惡作睡眠餘皆具有唯不善者謂瞋煩惱及無慚愧除諂誑憍所餘忿等餘皆有者如欲界説中間靜慮除前所除又更除尋餘皆具有第二靜慮以上乃至無色界中除前所除又除伺等等者顯除諂誑餘皆如前具有以從欲界乃至梵天皆有王臣衆生等別故有諂誑上地皆無如是已説三界所繫諸心所法俱生定量有諸心所性相似同難知差別今隨宗義辨彼難知心所別相無慚無愧愛之與敬別相云何頌曰無慚愧不重於罪不見怖愛敬謂信慚唯於欲色有論曰無慚無愧差別相者於諸功德及有德者無敬無崇無所忌難無所隨屬説名無慚諸功德者謂尸羅等有德者謂親教等於此二境無敬無崇是無慚相即是敬崇能障礙法或緣諸德説為無敬緣有德者説為無崇無所忌難無所隨屬總顯前二或隨次第於所造罪不見怖畏説名無愧諸觀行者所訶厭法説名為罪於所訶厭諸罪業中不見能招此世他世譏毀謫罰非愛難忍異熟果等諸怖畏事是無愧相即不忌憚罪業果義不見怖言欲顯何義為不見彼怖為見而不怖前應顯無明後應顯邪見此言不顯見與不見為無愧體但顯有法是隨煩惱能與現行無智邪智為鄰近因説名無愧此略義者謂能令心於德有德無所崇敬名曰無慚於罪現行無所忌憚名為無愧有餘師説於諸煩惱不能厭毀名曰無慚於諸惡行不能厭毀説為無愧有説獨處造罪無恥名曰無慚若處衆中造罪無恥説為無愧有説現起不善心時於異熟因無所顧眄名曰無慚於異熟果無所顧眄説為無愧諸不善心現在前位皆於因果無所顧眄故一心中二法俱起由此翻釋慚愧異相若淨意樂為習善人所樂勝業名有慚者為得善人所樂勝果名有愧者諸有愛樂勝業勝果必亦怖於惡因苦果一切善心現在前位定於因果皆無迷惑由此慚愧一心並生故有餘師以如是義標於心首説如是言於所造罪自觀無恥名曰無慚觀他無恥説為無愧謂異熟因當時現起故名為自其異熟果後時方有故説為他彼義意言諸造罪者意樂不淨於現罪業及當苦果皆無顧眄由此已釋經主此中誤取彼情橫申過難謂設難言若爾此二所觀不同云何俱起已説無慚無愧別相愛敬別者愛謂愛樂體即是信然愛有二一有染污二無染污有染謂貪無染謂信信復有二一忍許相二願樂相若緣是處現前忍許或即於中亦生願樂此中愛者是第二信或於因中亦立果稱前信是愛鄰近因故名愛無失敬謂敬重體即是慚謂如前釋大善地法中言心自在性説為慚者應知即是此中敬體然復有言有所崇重故名為敬由此為先方生慚恥故敬非慚彼師應許無慚恥者能起恭敬以執先起敬時未有慚恥故應無慚恥者能起恭敬若謂敬時已有慚恥則不應説由敬為先方生慚恥若謂敬時非無慚恥然敬非慚此亦非理言敬非慚無證因故非敬為先方生慚恥勿無慚者能起恭敬又勿有敬而無慚恥然復確執敬體非慚但有虛言都無實義故應敬體是慚差別謂或有慚名有崇重此慚差別説名為敬補特伽羅為境界故即慚差別得崇重名夫崇重者是心自在心自在性已説為慚謂於心中有自在力能自制伏有所崇重故説敬體是慚差別於諸所尊有所崇重故名為敬是境第七或因第七由於所尊發隨屬意即名為慚此慚即是有所崇重故此敬體是慚差別義善成就即由此證補特伽羅為境信慚説名愛敬非謂以法為境起者故愛與敬雖大善攝而不立在無色界中有餘師言信順親密而無耽染説名為愛瞻望所尊崇重隨屬説名為敬有餘師説親近善士因名為愛不越彼言因名為敬復有説者於和合衆見等皆同故名為愛於可尊重深心恭事故名為敬此愛與敬欲色界有無色界無無依處故如是已説愛敬別相尋伺憍慢別相云何頌曰尋伺心麁細慢對他心舉憍由染自法心高無所顧論曰尋伺別者謂心麁細心之麁性説名為尋心之細性説名為伺若爾尋伺體不異心經即就心説二性故此言非理由不了達經義意故經言所有心麁細性名尋伺者由有此法心起便麁此法為尋由有此法心起便細此法名伺或作異釋故體異心謂我不言心之麁性名心麁性心之細性名心細性若爾云何依心麁性名心麁性依心細性名心細性若爾麁細性相違故不應尋伺一心俱生雖一心中二體可得用增時別故不相違如水與酢等分和合體雖平等而用有增麁心品中尋用增故伺用被損有而難覺細心品中伺用增故尋用被損有而難覺若謂酢用一切時增故非喻者此言非理我不定説以酢喻尋伺喻於水但有用增者即説如酢故若心品中尋伺二法隨用增者即説如酢微便喻水由是尋伺雖一心中體俱可得用時別故而無一心即麁即細如貪癡性雖並現行而得説心為有貪行隨何心品有法用增由此為門總摽心品有説現見別法所持令其別法相續變故心體相續既有麁細故知別為尋伺所持有餘復言為立尋伺為定障故説尋伺為心麁細性云何知然諸聖教內處處於定立心名故謂契經中説四靜慮為定根已復説四靜慮為增上心學又契經説依住淨戒修習二法謂止觀已復説智者依住淨戒修習心慧又契經言離貪欲故心得解脫離無明故慧得解脫止觀是彼親近對治故知於定建立心名謂大仙尊見有觀行者方欲趣入中間靜慮時有法為障推求此障知尋為體復有觀行者方欲趣入第二靜慮時有法為障推求此障知伺為體既能為障故知別有若言煩惱足為定障何須別立尋伺障者此言非理煩惱唯障離染法故非為定障云何知然下地煩惱有雖已斷而上地定不現前故有雖未斷上地邊定亦現前故又唯煩惱為定障者應唯未斷能與趣入上地為障然尋伺等要現在前方與趣入上地為障又契經説靜慮中言寂靜尋伺離喜斷樂已離貪者修諸定時方説尋等寂靜離斷故知煩惱外別有尋等障於染善心為障別故不應責言煩惱障定何須別立尋伺為障是故所言為立尋伺為定障故説尋伺為心麁細性理善成立定之麁障説名為尋定之細障説名為伺由此故説心之麁性説名為尋心之細性説名為伺亦無有失非於上地定過患中更有如斯麁細名想故上地定得一味名由是彼無中間靜慮非上諸地如初靜慮於一地中有漸除障漸得勝定可立中間何故不説尋伺自相如説受等各別相耶辨諸法相有多門故謂聖教中有約自性辨諸法相或約相應果因功用及所緣等且如説言云何地界謂堅強性云何不善謂與無慚無愧相應云何三摩地謂心一境性云何為觸謂三和合云何為眼根謂眼識所依云何法智謂於欲界所繫諸行或彼行因或彼行滅或彼斷道諸無漏智如是等門辨諸法相皆於正理無所乖違是故不應責同受等諸法性相最極難知辨靜慮中當更分別如是已説尋伺別相慢憍別者慢謂對他心自舉性稱量自他德類勝劣若實不實心自舉恃𣣋蔑於他故名為慢憍謂染著自法為先令心傲逸無所顧性於自勇健財位戒慧族等法中先起染著心生傲逸於諸善本無所顧眄故名為憍於諸善本無所顧者謂由心傲於諸善業不欣修習是謂慢憍差別之相如是已説諸心心所品類不同俱生決定差別之相然心心所於契經中隨義建立種種名相今當辨此名義差別頌曰心意識體一心心所有依有緣有行相相應義有五論曰心意識三體雖是一而訓詞等義類有異謂集起故名心思量故名意了別故名識或種種義故名為心即此為他作所依止故名為意作能依止故名為識或界處蘊施設差別或復增長相續業生種子差別如是等類義門有異故心意識三名所詮義異體一如心意識三名所詮義異體一諸心心所名有所依所緣行相相應亦爾名義雖殊而體是一謂心心所以六內處為所依故名有所依以色等境為所緣故名有所緣即於所緣境品類相中有能取義故名有行相平等俱時與他合故説名相應云何平等五義等故謂心心所五義平等故説相應所依所緣行相時事皆平等故事平等者一相應中如心體一諸心所法各各亦爾有譬喻者説唯有心無別心所心想俱時行相差別不可得故何者行相唯在想有在識中無深遠推求唯聞此二名言差別曾無體義差別可知又由至教證無心所如世尊告阿難陀言若無有識入母胎者乃至廣説又説或心或意或識長夜流轉生於地獄乃至生天又説士夫即是六界所謂地界乃至識界又説我今不見一法速疾回轉猶如心者又説我今不見一法若不修習則不調柔無所堪能猶如心者又如契經伽他中説心遠行獨行無身寐於窟能調伏難伏我説婆羅門此等諸經皆遮心所又於心所多興諍論故知離心無別有體謂執別有心所論者於心所中興多諍論或説唯有三大地法或説有四或説有十或説十四故唯有識隨位而流説有多種心心所別如甘蔗汁如倡伎人故無受等別體可得心心所法共一境轉生住滅等分位是同善不善等性類無異體相差別實難了知非諸劣智能生勝解故契經言心心所法展轉相應若受若想若思若識如是等法和雜不離不可施設差別之相故應於此發起正勤求生勝解了差別相諸契經中處處説有受想思等識俱生故不可由不得一類別相便總撥一切聖教真理縱仁於此識想差別若得不得然其想相離於識體決定別有我於此二差別相中分明證得謂若於彼諸境界中總了其體説名為識別取名相施設名想復云何知此二俱起非於境界總了體識無間滅已別取名相施設識生即名為想由阿笈摩及正理故阿笈摩者謂契經中先説識已後説俱生受想思故言正理者謂於眼識所了色中取相名想若於後時想方起者前色已滅云何今時有相可取辨本事品已遮眼識緣過去境若言意識能取彼相理亦不然經説眼觸所生想故若謂此如意近行説此亦非理意識不從觸所生故猶如眼識非有諸識三和所生如何可言識從觸起若彼復執從意識後方生意地能取相想此非眼識無間所生便違所言如意近行又從身觸所生身受若同彼想不現領納身所取境如何現前分明隨領順苦等觸不應許此領納過去所觸境生相分明故又生次第理不成故謂經所説眼觸所生受想及思三心所法眼識無間誰定先生彼許此三是識差別故識不可多體俱生定次第生無因證故應説三法誰最初起雖引至教證唯有心而於義中無證功力識於諸處有勝功能非諸心所是故偏説又諸心所無不依心但説所依能依已顯又心心所隨處隨時用有增微就增者説或有心品識用增強或受或想或復思等隨一一法用增強位以此為門總摽心品故唯説識不妨有餘心獨行言為遮心並起不遮心所如言人獨行故所引經無證功力言於心所有多諍論故知離心無別體者此亦不然皆信有故謂依理教諸大論師皆信離心別有心所但於多少數增減中經無定説故興諍論若執受等是心差別如何即心可名心所據何定理説識為心復以何緣即名心所若謂諸識體即是心受等諸法是心體類心相續中有此法故名心所者何故不言所造諸色即是大種體類差別即於地等相續位中有此法故名為所造此既不爾彼云何然離大種外別有所造辨本事中已廣成立若責何故知心所法決定離心別有體者由阿笈摩及正理故阿笈摩者如契經言眼色為緣生於眼識三和合觸俱生受想思等心所如是諸法是心種類依止於心繫屬於心故名心所此俱生言不説無間但顯心所同時而生俱有因中當更成立又不容有心體俱生故知但説心所俱起若謂如前所引經説心心所法展轉相應若受若想若思若識如是等法和雜不離不可施設差別相者此經意顯心所與心其體無別此亦非理壽識暖三亦同此説應無別體不可説言識之與暖其體無別又和雜言顯有別體非無別體可説和雜若唯有識前識滅已後識方生云何可言如是等法和雜不離若言由此受想思識無間生故名和雜者此亦不然理不成故餘契經説俱生言故或識無間有此法生容可説言和雜不離非識無間有受等三俱時而起如何可説受想思等與識和雜故彼所執理教相違又契經言修觀行者得他心智能知他心及心所法而記別言汝意如是汝意如此汝有此尋汝有此伺乃至廣説不應即心名為心所如前已辨由是等類諸阿笈摩證知離心別有心所由正理者如前所説謂於眼識所了色中取相名想若於後時想方起者前色已滅云何今時有相可取乃至廣説有餘復言如契經説名映於一切無有過名者由此名一法皆隨自在行名者即是受想行識既言一法故知唯心無別心所此言非理以名如色多體成故如契經言法有二種謂名及色非大種等差別相法一法為性此亦應爾有餘復言若心心所其體各異於一心品應有衆多能覺了用故心所法應不異心此亦不然能覺了用體唯一故覺了謂慧非心心所皆慧為體如何令餘非覺了性成覺了體故無斯過有餘復言我等現見唯有一識漸次而轉故知離心無別心所此亦非理受等如心體相分明現可取故又心心所雖體俱生而其功用非無先後用增強位體方可知如諸大種此亦應爾有何定因唯心心所俱時而起説名相應非諸大種或所造色由大種等體有增不增故若爾心所體亦應然不爾一相體無增故又契經説見為根信證智相應故諸大種或所造色無相應義若言不爾不遮餘故非彼經中説諸色法無相應義又亦説色有相應故謂於諍處説二相應此言非理太過失故如於一分佛説色言應一切法皆色為體若言世尊唯説大種所造為色此亦非理不遮餘故若謂變壞故名為色知此色言已遮餘法此亦非理唯變壞義非定知故若謂經言手等觸對故名變壞唯變礙義是色非餘此亦非理不決定故非彼經中説唯變壞是色非餘又餘經中亦説無色有變礙故謂契經言意為可意不可意法之所變礙故無色法亦應是色如是經言了別境界故名為識應諸色法亦識為體若謂不然曾無説色識為體故此不應理如想受等應成識故又不遮故若謂如何無所緣法而得説為了境識者此亦非理自計度故何處經言無所緣法不能了境又何處説色無所緣是故應唯心心所法有相應義同一所依所緣行相時事等故諸契經中見心心所有如是義非大種等以大種等方處勢用各各差別雖暫和合不相離故假説相應而非畢竟有相應義唯心心所畢竟相應故相應言義善成立有餘師説如一器中煎水湧沸擊爛燒動四用差別俱時有故知四大種異體和雜實有義成如是衆多心心所法展轉相助雖同一時所依所緣行相相似而其勢用各各差別無雜亂故知有別體如斯論旨諸部極成皆已共摧唯有心論故心心所別有義成
