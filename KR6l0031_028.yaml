body:
  text: 尊者衆賢造三藏法師玄奘奉詔譯辨緣起品第三之八應知如是所説三際唯有情數緣起義中雖有十二支而三二為性三謂惑業事二謂果與因其義云何頌曰三煩惱二業七事亦名果略果及略因由中可比二論曰前際因無明後際因愛取如是三種煩惱為性前際因行後際因有如是二種以業為性前際識等五後際生老死如是七名事惑業所依故如是七事即亦名果義準餘五即亦名因以煩惱業為自性故何緣中際廣説因果後際略果前際略因中際易知應廣説二前後難了各略説一由中比二具廣已成故不別説説便無用如何別立愛取二支毗婆沙師許初念愛以愛聲説即此相續增廣熾盛立以取名相續取境轉堅猛故若爾應説三支剎那何故唯言二剎那性無斯過失一一境中各一剎那合成多故正結生位唯一剎那於一身中無容再結故生與識獨説剎那何緣現在諸煩惱位偏説於愛非餘煩惱於愛易了愛味過患餘煩惱中此相難了愛是能感後有勝因世尊偏説令知過患云何當令勤求治道故唯説愛剎那相續二位差別非餘煩惱有餘師説一切煩惱初緣境時説名為愛後增廣位説名為取故佛雖説業因於愛愛因無明而實業因通一切煩惱一切煩惱皆無明為因故知愛聲通説諸惑欲令因此總知過患故以愛聲説諸煩惱非餘煩惱招生劣故有説愛聲唯説愛體多現行故由此於愛分別剎那相續差別雖非無此理然前説為勝若緣起支唯有十二老死無果離修對治道生死應有終無明無因無明是初故生死應有始或應更立餘緣起支餘復有餘成無窮過又佛聖教應成缺減然不應許此難不然未了所説緣起理故此緣起理云何應知頌曰從惑生惑業從業生於事從事事惑生有支理唯此論曰唯聲正顯有支數定兼顯業與惑或俱或後生是惑生惑時業俱或後義由如是理總攝有支即已善通前所設難從惑生惑謂愛生取從惑生業謂取生有無明生行從業生事謂行生識及有生生從事生事謂從識支生於名色乃至從觸生於受支及從生支生於老死從事生惑謂受生愛由立有支其理唯此已成老死為事惑因老死即如現四支故及成無明為事惑果無明即如現愛取故豈假更立餘緣起支故經言如是純大苦蘊集是前後二際更相顯發義是故無有老死無明無果無因有終始過於此定攝因果義周無更立支成無窮過由佛遍説因果無遺故無聖教成缺減失此中上座作是釋言餘經中説非理作意為無明因無明復生非理作意非理作意説在觸時故餘經説眼色為緣生癡所生染濁作意此於受位必引無明故餘經言由無明觸所生諸受為緣生愛是故觸時非理作意與受俱轉無明為緣由此無明無無因過亦不須立餘緣起支又緣起支無無窮失非理作意從癡生故如契經説眼色為緣生癡所生染濁作意餘經雖有如是誠言然此經中應更須説若由理故不説自成則一切支皆不應説設許理有文但略標便違自執此經了義許此經文非盡理故凡諸所有不盡理文智者判為非了義故既許理有非載此文便證支名從勝而立且此經雖言六處緣觸而上座亦許緣識作意以契經説眼及色為緣生於眼識及染濁作意雖緣六處亦生識等而此但言六處緣觸如是觸緣非唯六處但六處位六處最強於觸位中觸最為勝就勝而説餘例應思然經主言經不別説老死有果無明有因生死便成有終始者此難非理經意別故亦非所説理不圓滿所以者何此經但欲除所化者三際愚故由所化者唯生是疑云何有情三世連續謂從前世今世得生今世復能生於後世如來但為除彼疑情説十二支如前已辨謂前後中際為遣他愚惑今詳經主苟欲違背毗婆沙宗捨自劬勞所作如理釋疑難頌所謂從惑生惑業等自謂所言能免他難今詳彼釋於難未免謂雖欲遣他三際愚説緣起教而不具説老死有果無明有因非不了知前因後果相連續義名諸所化已能除遣前後際愚所化有情謂中間諸位如無明老死因果俱無便有斷常二見交起豈知從前世今世生及了從今世後世起經既不顯老死無明有果有因連續不斷所化定謂中間餘支亦因果俱無如無明老死則緣起教便足他疑豈謂除他三際愚惑故於所難殊未能通枉捨劬勞自所造頌釋難已了如世尊言吾當為汝説緣起法緣已生法此二何異且本論言云何為緣起謂一切有為復作是言云何已生法謂過去現在此已生法必應有緣故知唯過現名緣已生法準此緣起亦在未來以住未來是起法故豈不本論亦作是言謂一切有為名緣已生法此無有失緣已生蘊攝過去現在一切有為故非已生法説名已生不應正理以相違故然未來法亦得名起與有為相不相離故即由此理前已説言是起法故得名緣起故未來法不名已生如現未來不名已滅是滅法故亦得滅名此中有言據當有義未已生法亦名已生故世間言紐繩造釧外論亦説祠火求男此違教理如説云何非已滅法謂現未法及諸無為若未來據當名已生者則未來現在應名已滅如現未法是滅法故但得滅名不名已滅則未來法是起法故但得名起不名已生如是方名不違理論又不生法於彼成違以彼必無當生理故如何據當説亦得名已生又彼理窮引俗事證有聖教理證此義成豈世俗言證賢聖法尊者望滿説諸法內有是緣起非緣已生應作四句第一句者謂未來法第二句者謂阿羅漢最後心位過現諸法第三句者餘過現法第四句者謂無為法若未來法非緣已生豈不違害契經所説如説云何緣已生法謂無明行至生老死生與老死既在未來而經説為緣已生法此無違害且應審知一切有支皆有為故一一定為三世所攝無明行支及生老死如何可為現在所攝由約生身展轉理故約未來世二生身説現在愛取有得無明行名約過去世二生身説現在識至受得生老死名故過未四支皆可現在攝然彼尊者復作是言若無明行二在現在彼餘十支在未來世八無間當生二第三當生若生老死二在現在彼餘十支在過去世八無間已滅二第三已滅由如是理十二有支一切可為現在世攝故生老死亦名已生由此與經無違害失非未已生位可説為已生今詳尊者所説義意若從因已起名緣已生若與餘為因説名緣起非無為法得緣起名以為因相不圓滿故因相者何謂前已説依此有彼有此生故彼生依此無彼無此滅故彼滅雖有無為諸法得起而不可説此生故彼生亦不可言此滅故彼滅及不可説依此無彼無無生滅故體常有故諸無為法能作所緣無障礙住於有為法成能作因然於有為無取與力闕於因相由此佛説諸因諸緣能生識者皆無常故有餘師説無明名緣起行名緣已生如是展轉乃至生名緣起老死名緣已生如是所説不順經義以契經中説無明等皆名緣起緣已生故有説無明唯説名緣起最後老死唯名緣已生中間十支俱通二義非老死位定生諸惑是故老死唯名緣已生無明定能發起諸行故無明位唯説名緣起諸對法者有作是言前際二支説名緣起此二意説為因性故後際兩位名緣已生中際八支皆通二義如是二説俱不順經經説諸支皆通二故如是二句決定義者頌曰此中意正説因起果已生論曰諸支因分説名緣起所以者何由此為緣能起果故以於因果相繫屬中説緣起故此緣起義但以緣聲而成立故如契經説云何緣起謂依此有彼有及此生故彼生即無明緣行至生緣老死如是説已復作是言此中法性乃至最後無顛倒性是名緣起何等名為此中法性謂於因果相繫屬中有因功能皆名法性要有因故因果方有更相繫屬非無有因如是性言顯能生義唯有為法性得此法性名雖此經中非正顯示於因果相屬因性名緣起而以緣聲顯緣起義故知因性得緣起名以緣聲但於能顯義轉故因能顯果故説名緣由是阿羅漢最後心心所非等無間緣無所顯果故即由此義證緣起名定於因果相屬中立故佛於彼勝義空經説此中法假謂無明緣行廣説乃至生緣老死以非勝義故立假聲即目因果更相屬義諸支果分説緣已生所以者何由此皆從緣已生故果是諸法成辦名故要已生法此義成故涅槃成辦由得已生故彼亦由已生名果或復於此説緣起門涅槃於中無容為難若有為法果義決定是此所明如沙門果諸過現法果義決定名緣已生法在未來果義非定廢而不説此略義者是起法性説名緣起過現諸法名緣已生果義定故謂於因果相繫屬中據為因分説名緣起定為果者名緣已生又此中因名緣起者以能為緣起諸果故於此中果法名緣已生者以過去現在離緣不生故如是一切二義俱成諸支皆有因果性故雖因果性實體無別而義建立非不極成以所觀待有差別故謂若觀此名緣已生非即觀斯復名緣起譬如因果父子等名然此契經説有密意阿毗達磨無密意説何等名為此經密意謂薄伽梵密顯生死無始有終説斯二句言緣起者顯生死流無始時來旋還無斷故説順逆諸支相生緣已生言為顯生死若得對治有終盡期謂若有緣後更續起如其緣闕後不續生由是經言作苦邊際又經中説緣起是假因果相屬無自性故説緣已生其體是實是彼依故如瓶所依阿毗達磨説二皆實因果二體俱實有故如是已顯毗婆沙宗不違契經緣起理趣詳經主説此違經者由未承稟毗婆沙師或師未達毗婆沙義或雖披覽毗婆沙文邪執覆心不鑒正理有餘部師説緣起是無為以契經言佛告乞士如是緣起非我所作非他所作如來出世若不出世如是緣起法性常住乃至廣説由此意説理亦可然謂此意言如是緣起無別作者故説無為如來出世若不出世行等常緣無明等起非緣餘法或復無緣如是法性非佛所作非餘所作説為常住此亦無疑如是名常理必然故若説別法名為緣起如擇滅等是凝然常此必不然説為緣起而言體常理不成故又彼所執無為緣起為異無明等為即無明等為攬彼所成如是三執皆不應理自性難知故有無常過故體應非實故或復如言取經義者則四大種應亦許常以世尊言是四大種乍可令異乃至廣説此經遮彼有為相故若不觀理趣應執是無為或佛出世若不出世此地水等恆堅濕等何緣不執此等皆常然彼於中有許不許故知但是麁心所為且置斯事復應廣釋無明名色觸受四支所以者何行有愛取業隨眠品當廣釋故識與六處辨本事品已廣釋故且無明義其相云何為是明無為非明攝若取前義無明應是無若取後義應眼等為體如是二種理皆不然且上座言由有此故令明非有是謂無明不可無因而有是事彼説非理若由有此為障礙故明不現行惑不得明名無明者則一切煩惱皆應是無明隨一有時二俱成故又不應執無明能與明無為因以有與無契經不説能為因故又無不應是果性故如何乃説不可無因而有是事非於無物可説有言彼宗許有唯現在故又彼宗義雖無無明而許有時明亦非有不應定説無明障明若謂彼有無明隨界理亦不然非自體故設許隨界體亦無明此體有時明亦得起故不應説能障於明若謂此明至正生位無明隨界至正滅時故説無明能為明障則住學道應離無明或復應明畢竟不起無明隨界未曾無故若謂如得隨界應然謂如汝宗諸無明得非無明體然或有時無明雖滅由無明得勢力所障明不得生或復有時雖有此得由加行力明亦得生如是我宗無明隨界非無明體然或有時無明雖滅由隨界障明不得生或時得生斯有何過此救非理違自説故太過失故非我許故謂彼自説由有此故今明非有是謂無明而今復言無明隨界非無明體然能障明豈不後言違前自説又無明體滅隔多時復得生者離無明者亦應後時無明更起許隨界體非無明故俱離無明無有差別又我不許由無明得勢力所障明不得生非對法宗説障餘法令不得起是此得用若爾此得其用云何謂此為因無明不失何名不失亦無別體但由得用令所得法數容更起立不失名過去無明豈容更起不爾若爾此得何用雖不能令所得更起然於未起對治道前由此恆隨相續無斷豈不此與無明俱滅此雖俱滅後復續生謂彼滅時有為因力引餘自類令無間生餘復引餘乃至道起或令所得無明與果是此得用謂得斷已此無明果不復得生若無明得無無明能與果應明生已無明復生過去無明非無體故既得未斷無明果生得已斷時彼果不起故此差別由得而成如是所言不越前相謂令所得數容更起成不失因説名為得豈不有法有得而不生如何可言法生因謂得以所得法離得不生故法生因説名為得如依眼識離眼不生亦如汝宗無明隨界如汝隨界雖恆時有而無明果不許恆生我得亦然不應為責此例非理以對法宗雖無明得無而無明容起我宗離隨界無明必不生故此隨界非同彼得無如是失且引彼宗證得為因理極成故謂要有得所得法可生故得為生因理極成立又隨界論亦同得故以離隨界法亦可生謂諸異生無聖法隨界正修加行聖法容得生又前已説差別言故謂由得用令所得法數容更起成不失因説名為得何關已失及本未得而可為難又舊隨界已顯理無彼宗無明不現前位便為已得永離無明如何無明後時得起此設不起聖道加行何法為障令明不生即由此因諸阿羅漢明不起位便失於明明於後時如何得起設非縱逸明體終無何法為治無明不起是故彼説由有此故令明非有是謂無明但有虛言都無實義唯對法者容作是言朋壞法宗無容説此上座復説或如是類心及心所總謂無明若爾無明應非實有許依心等假建立故如此所説理亦不成一切心心所皆應無明故謂此無明為自性住心等為體為有差別若自性住一切善等品類心等應皆無明非諸無明亦有不用非理作意為因而起此彼為因契經説故非不染污心心所法可用非理作意為因若有差別能差別者可是無明非所差別又彼應説此差別相心心所法體相各殊如何總成一無明相言心心所總謂無明詳彼心遊如來教外上座又言或顛倒明即謂無明以薄伽梵亦於邪見説無明故如契經説於邪見中若習若修若多修習癡便猛利由是應有二種無明一者邪智二者黑暗彼言非理見行癡行差別建立應不成故邪見黑暗定有差別若異此者二種應無非無差別可成二種既於邪見若習若修若多修習癡便猛利則於黑暗若習若修若多修習癡亦猛利契經説癡因無明故豈不二果無差別故應許二因亦無差別是則建立見行癡行差別之相應不得成然見行者與癡行者入甘露門各有差別故彼上座於經義迷若爾云何是此經義非不愚者有倒見行故邪見俱無明必有故於邪見若習若修若多修習癡便猛利然非邪見即是無明何故無明邪見俱起言癡猛利非邪見耶非此所明有而不説此中意説數數現行利貪瞋癡為煩惱障謂先有問云何貪等成猛利耶後即答言於貪欲中若習若修若多修習貪便猛利乃至廣説若爾所立見癡二行應成雜亂不爾見有三種差別無雜亂失謂或有見唯顛倒轉或復有見全增益轉或復有見少增益轉於此三中唯倒轉者癡力勝故立癡行名餘二見強立為現行故立二行無雜亂失貪瞋俱轉雖有無明劣故不言癡便猛利由此二惑緣有事轉故此品中癡非增上惑為顯示生死無初説煩惱生因同異類如彼經説諸貪瞋癡莫不皆因無明而起或為訶毀不正見故言習邪見癡便增長如彼經言夫名智者能滅無智此增癡故不名智者乃至廣説故應勤求契經實義不應執見即是無明後釋頌中當更遮遣大德邏摩作如是説非邪見體即是無明然諸貪欲瞋恚邪見由異種類貪瞋癡三為各別根而得增長此亦非理如何貪瞋可名貪欲瞋恚異類又癡何故但為邪見根不為根增長貪欲瞋恚貪瞋何故非邪見根然彼不能辨其意旨故彼所説非稱經義有説無智唯是智無是故無明非有為性若爾除佛餘無學果應有無明無遍智故若謂別説前際等無智為無明故無如是過者不爾智無無差別故夫言無者性相俱無如何可言屬此屬彼或復彼應説二智無別相謂以何為相名前際智等無念無間智等無復以何為相二俱遮智一是無明一非無明此有何理故彼所説亦非經義有説於是處明無謂無明如世間言無鹽食等亦非離色等應成無明故若謂一切煩惱明無説名無明亦不應理以於結縛隨眠等門離欲貪等別説有故又前所説過隨逐故又若一切煩惱為體此無明體亦應是見是則與見應不相應由此亦非貪等俱轉執無明體即貪等故不應即貪等與貪等相應煩惱應無互相應理又亦應説無明染心以貪欲體即無明故若謂此經據差別説亦應據別説能染慧是則應許別有無明能染污慧不應謂總以總無明非別性故由是應許別有無明其義云何頌曰明所治無明如非親實等論曰如諸親友所對怨敵親友相違名非親友非異親友所餘一切中平等類非親友無諦語名實此所對治虛誑言論名為非實非異於實所餘一切色香等類亦非實無等言為顯非天非白非法非愛非義事等阿素洛等天等相違得非天等名非異無天等如是無明別有體實是明所治非異非無云何知然猶如識等説從緣有為他緣故復有誠證頌曰説為結等故非惡慧見故與見相應故説能染慧故論曰經説無明以為結縛隨眠及漏枙瀑流等非餘眼等及體全無可得説為結縛等事故有別法説名無明如惡妻子名無妻子如是惡慧應名無明彼非無明有是見故諸染污慧名為惡慧於中有見故非無明見是推尋猛睿決斷不可説彼名為愚癡若爾無明應是非見諸染污慧此亦非理以許無明見相應故無明若是慧應見不相應無二慧體共相應故不可説見非無明俱非不愚癡見成倒故又説無明能染慧故如契經説貪欲染心令不解脫無明染慧令不清淨非慧還能染於慧體如貪異類能染於心無明亦應異慧能染亦不可説無明與慧雖不相應而能為染如貪為染必與心俱心心所法無等起染但有自性相應染故不可自體自體相應是故無明定非惡慧經主於此假作救言如何不許諸染污慧間雜善慧令不清淨説為能染如貪染心令不解脫豈必現起與心相應方説能染然由貪力損縛於心令不解脫後轉滅彼貪熏習時心便解脫如是無明染污於慧令不清淨非慧相應但由無明損濁於慧如是分別何理相違今詳彼言非善分別離相應品不能染故若相應貪心相應故能染於心不相應貪以未斷故亦能染者則非阿羅漢應無不染心若謂彼貪有染不染曾所未見又成非愛失貪纏正現前應有不染故又若相間雜名能染者則諸無漏慧亦應被染又無染慧雜有染慧應令有染轉成無染能治力強非所治故又諸善慧正現行時染定非有諸染污慧正現行時善定非有説誰能染復染於誰若現有非有能互相染則應畢竟無得解脫義若滅熏習便解脫者熏習本無更何所滅設有熏習亦非能染非無明體前已説故滅不滅位竟有何別故説無明能染慧故非慧為性理無傾動若有別法説名無明應説以何為別法性且有別法謂不了知此即無明何勞推究應定何法名不了知方可説為無明自性唯薄伽梵於一切法正知正説若性若相餘唯總了何苦推徵然我於斯見如是相謂有別法能損慧能是倒見因障觀德失於所知法不欲行轉蔽心心所是謂無明如何定知此有別法以如貪欲説永離故謂契經言離貪欲故心便解脫離無明故慧得解脫又此如明説為因故謂契經説無明為因起諸雜染明為因故離諸雜染又説如邪見有近對治故謂契經説諸邪見斷由正見生諸無明離由明慧起又契經説是一法故謂契經説若有苾芻能斷一法我正記彼所作已辦即是無明又説如暗有對治故如伽他説諸有能斷愚於所愚不惑彼轉滅愚惑如日出除暗若謂暗體非別實物但以明無為其體者此不應理明應爾故若謂明生有緣可得暗則不爾理亦不然生緣各別如水等故謂或有水生無外聚緣或有水生待外聚緣力地等不爾餘隨所應故法生緣各有差別如是明起必待餘緣暗則但由違緣非有同類因力及俱生緣其體得生有違何理又見暗體有品別故非但明無可有品別若謂是處明分有無故暗得成微中麁者亦不應理無法體無無容得成品類別故又有非有不同處故又暗與影眼識境故如青等色其體實有非五識身能緣假法如前已辨又暗與影界所攝故實有義成又如煙雲障餘色故暗亦應爾其體非無若謂暗中眼識不起由明非有非暗障故理亦不然緣明所隔遠處暗色眼識生故不見暗中餘色物故若謂暗處餘有色物無明攝益非暗障故理亦不然彼可疑故此中理趣如前已辨又此如香體非非有可久習近故相不分明故攝益眼因故若謂由光損眼勢用此光無處眼增益者亦不應理久住其中觀此還能為損因故若謂暗體非實有法明不俱故無色相故此亦不然雜明隔明現可得故豈不明處暗體必無有對皆然何獨明暗又契經説黑暗為緣明界可了非無有法能作他緣故暗有體又暗如日可出現故如言日沒暗便出現無法不應有出現義又説緣杌而現影故杌既是假影應非實此難不然如腹雖是假而生實飢渴前已成故又可領觸猶如受故又世尊告婆澀波言於意云何豈不緣杌而現於影根本若斷此法不生乃至廣説非於無法可説此言又契經言如入密室見暗充滿非於無體可有如斯見充滿義又契經説以衆光明破諸黑暗暗若非有其體本無豈更須破又契經説若不斷本如影必隨乃至廣説由如是等衆多理教故知影暗其體實有由此所言無明如暗有對治故其理極成是故無明定有別法無知為體非但明無然此無知略有二種謂染不染此二何別有作是説若能障智是染無知不染無知唯智非有今詳二種無知相別謂由此故立愚智殊如是名為染無知相若由此故或有境中智不及愚是第二相又若斷已佛與二乘皆無差別是第一相若有斷已佛與二乘有行不行是第二相又若於事自共相愚是名第一染無知相若於諸法味勢熟德數量處時同異等相不能如實覺是不染無知此不染無知即説名習氣有古師説習氣相言有不染污心所差別染不染法數習所引非一切智相續現行令心心所不自在轉是名習氣非唯智無無法無容能為因故亦不應説有如是類心及心所總名習氣不染無知前已説故謂此無知為自性住心等為體為有差別若自性住心等為體佛亦應有不染無知若有差別能差別者可是無知非所差別現見善等品類差別心心所中必有別法為能差別非即一切如善品中必有信等不善品中有無慚等染污品中有放逸等如是等類心心所中必有別法為能差別故知此中亦有別法能為差別者是不染無知今詳彼言有太過失諸異生等心心所法皆不如實覺味勢熟等相然不見生餘心所故又一一念彼心心所差別而生應念念中各有別別無知法起若謂有異相令無知差別即此足能差別心品何須別計不染無知是故即於味勢熟等不勤求解惠與異相法俱為因引生後同類慧此慧於解又不勤求復為因引生不勤求解慧如是展轉無始時來因果相仍習以成性故即於彼味等境中數習於解無堪能智此所引劣智名不染無知即此俱生心心所法總名習氣理定應然或諸有情有煩惱位所有無染心及相續由諸煩惱間雜所熏有能順生煩惱氣分故諸無染心及眷屬似彼行相差別而生由數習力相繼而起故離過身中仍名有習氣一切智者永斷不行然於已斷見所斷位通染不染心相續中有餘順生煩惱習性是見所斷煩惱氣分於中染者説名類性金剛道斷皆不現行若不染者名見所斷煩惱習氣亦彼道斷由根差別有行不行若於已斷修所斷位唯於不染心相續中有餘順生煩惱習性是修所斷煩惱氣分名修所斷煩惱習氣是有漏故無學已斷隨根勝劣有行不行世尊已得法自在故彼如煩惱畢竟不行故佛獨稱善淨相續即由此故行無誤失得不共法三念住等又由此故密意説言唯佛獨名得無學果大德邏摩作如是説有不染法名為習氣如不善因所招異熟世尊昔在菩薩位中三無數劫修諸加行雖有煩惱而能漸除煩惱所引不染習氣白法習氣漸令增長後於永斷諸漏得時前諸習氣有滅不滅以於長時修加行故證得無上諸漏永盡然佛猶有白法習氣言習氣有滅不滅故如是所説理亦可然而彼不能顯其體性不染習氣其體是何非但虛言令生實解經言類性其體是何有作是言我慢為體彼違經説以契經中於我慢外説類性故經言我今如是知已如是見已諸所有愛諸所有見諸所有類性諸我我所執我慢執隨眠斷遍知故無影寂滅故知類性異於我慢有説餘慢是類性攝彼説不然諸言流至我慢中故我慢執言攝諸慢盡應如愛等各攝無遺然於此中勝者別説我我所執是諸見根故於見中別顯二種為攝疑恚説隨眠言勝煩惱中無明未説為別顯彼説類性言遍與惑俱遍往諸趣故名類性類是行義是類之體得類性名
