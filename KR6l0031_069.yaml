body:
  text: 尊者衆賢造三藏法師玄奘奉詔譯辨賢聖品第六之十三如是已破經主所宗有餘師言如見斷惑所有解脫必無退理是無漏道所得果故有頂地繫修所斷惑所有解脫亦無退理彼説非理道力異故前已説故餘無漏道所得解脫見有退故謂見修道力用各異見道位中以一品道斷多品惑修道位中多品道斷多品惑故若謂此異由煩惱力謂見斷惑依無事轉修道所斷依有事故此亦不然以世俗道斷此煩惱亦多品故或復但應以見斷惑依無事故斷無退理非無漏道所得果故若謂異生斷無事惑亦有退故證知諸聖見斷解脫無有退者是無漏道所得果故則不應言以無事故雖多品惑一品道斷故知由道力異義成由此見修不應為例又前已説前説者何謂見斷生由審察力修所斷惑由境力起非諸聖者於所緣中無片依希橫興計度故見所斷解脫無退諸異生類猶未見真故於所緣容橫計度雖有已斷下八地中見所斷惑亦容有退聖已見真於見所斷必無有退然失念故於外境中取妙等相便有染著憎背高舉不了行轉由此道理修斷解脫聖亦有退故彼所言諸異生者斷無事惑亦有退故證知諸聖見斷解脫無有退者是無漏道所得果故理定不然又餘無漏果亦見有退故謂彼所宗必無聖者煩惱斷果世道所得以彼論言聖者惑斷是世道果理不成故塢陀夷經説有聖者先得有頂定後生色界中離退上斷無生下義彼宗不許聖以世道伏惑不許聖起靜等行故聖無觀有為靜等故非彼宗離見非常等所有聖道能實斷惑異生斷惑至聖位中必無退理雙道鎮故由此但依無漏道斷經説先得滅受想定後還退故生色界中是故極成餘無漏道所得斷果亦有退義故彼所言如見斷惑解脫無退有頂修斷解脫亦爾是無漏道所得果故理定不然上座此中亦作是説定無阿羅漢退阿羅漢果所以者何由理教故云何為理謂應果必無非理作意故阿羅漢後心應生煩惱故謂若應果安和位中住等運相許退起惑如何死時息不調順諸根擾亂煩惱不生若煩惱生應續後有云何為教謂契經説尊者戍拏即於佛前白言大德若有苾芻諸漏已盡成阿羅漢廣説乃至能不忘失心解脫性設有殊妙眼所識色來現在前彼於所證心解脫中無勞防護鬪戰喻經作如是説諸聖弟子住無怖心彼於爾時魔不能擾藍薄迦經亦作是説若漏已盡成阿羅漢行住坐臥無不安隱所以者何魔不壞故毒箭喻經亦作是説佛告善宿樂涅槃者所有非想非非想結爾時皆得永斷遍知如斷樹根截多羅頂無遺餘故後更不生諸辨退經咸作是説若與弟子共相雜住我説由斯便從先來所證四種增上心所現法樂住隨一有退若由遠離獨處間居勇猛精勤無放逸住所得不動心解脫身作證我決定説無因緣從此退又契經説若有苾芻諸漏已盡成阿羅漢我終不説彼阿羅漢應不放逸所以者何由彼具壽已不放逸不復能為放逸事故敘彼上座所執如是理且非理非理作意前已説故前説者何謂前已言不應惑起皆以非理作意為先論文且説從染生者若諸染起必染為先則餘性心應無行義又彼所立因義不成與所立宗品類同故謂染作意得非理名彼所立因顯阿羅漢無起染故不生煩惱以無煩惱名阿羅漢今欲推究阿羅漢心煩惱既無有退生不彼立宗曰必不退生復立因言無起染故既爾豈不是品類同此不成因智者所判又彼所説無非理言為無已生為無正起如是二種俱不極成或彼意言無惑種故諸阿羅漢不退起惑前已廣答種有無理故一切種彼因有失由此亦已遣無顛倒故因顛倒與惑無別性故後心起惑亦不成因所以者何以阿羅漢後心不是等無間緣如何有能引餘心義趣無餘依般涅槃故背諸生死流轉事故一向處中任運轉故若於此位起煩惱者應障諸蘊畢竟斷滅故阿羅漢死有位中決定無能退起煩惱又住此位極順厭心設於先時有煩惱者得至此位尚斷無餘如契經言彼於現法多辨聖旨或臨終時況彼先時已無煩惱今有趣入無餘涅槃作意現前寧方起惑故無後心應起惑過又言應果安和位中住等運相許退起惑亦不應理非所許故謂我唯許安和位中有順惑心方能起惑若正堅信等運相心能障惑生如何起惑故彼所立遮有退理不能證成應果無退教亦非證且戍拏經於有退宗都無違損依遮受欲説此經故謂彼尊者獨處空間欻爾思惟我家巨富眷屬廣大應速歸家坐受欲樂行施修福佛知其念遣使命來為現神通記説教誡令伏令悟得成應果成應果已作是思惟我今應時來見善逝此意為顯今蒙命來勝於先時無邪思惟作是念已復依異門顯記自身與諸應果有不受欲應果共相白言大德若有苾芻諸漏已盡成阿羅漢彼於爾時住於六處心得解脫謂住出離無害遠離愛盡取盡及不忘失心解脫性設有殊妙眼所識色來現在前彼於所證心解脫中無勞防護此意顯示一切應果由對治力之所攝持無處無容受諸欲境是故設有妙境現前無勞護心是此中義或彼尊者依自説故不應為證非諸應果皆與戍拏根性等故或此總依諸應果説以彼自説差別言故如彼自言謂住出離無害遠離乃至廣説此顯若能住出離等無勞防護餘則不然我宗亦言恆時尊重修加行者便能不退如是義意毒箭喻經世尊於中分明顯示我後至彼當廣分別鬪戰喻經亦不成證此依遮止怖後有説如餘處説此亦爾故謂此經言魔不能擾非此經意説煩惱魔但説欲天大自在主以此經後作如是言爾時彼魔忽然不現此中意顯若般涅槃魔則無能求其心識謂佛弟子正捨命時多有魔來求其生識勿彼神識越我境界如於餘處亦遮應果怖畏後有如契經言已拔愛根無愁何怖又餘經説如樹根未拔苗斫斫還生未拔愛隨眠苦滅滅還起又契經説若已見聖諦令諸有路絶生死本既滅更不招後有又一切處讚應果言捨諸重擔盡諸有結所以名為盡有結者謂結招有名為有結諸阿羅漢於有結中心善解脫故名為盡是故非彼所引契經能遮我宗應果退義由此已釋藍薄迦經彼皆自知不受後有雖亦有怖退現法樂而於威儀無不安隱故諸應果法有智生能自了知不受後有觀別意説毒箭喻經故亦不能遮有退義若阿羅漢於三界結一切皆得永斷遍知如斷樹根截多羅頂無遺餘故後更不生如何此中偏説非想故知此説定觀別意今當辨此起説所因謂此經中佛告善宿樂世財者若住現前為説如斯相應言論彼心便住所説義中亦能於中造隨法行廣説乃至引喻況己具壽善宿白世尊言此補特伽羅於村邑等處為欲貪結繫縛其心廣説乃至為説不動相應言論不樂聽受如是廣説樂不動者於無所有處相應言論不樂聽受樂無所有處者於非想非非想處相應言論不樂聽受樂非想處者於般涅槃相應言論不樂聽受樂涅槃者亦於非想非非想處相應言論不樂聽受經中如是次第廣説非我於此作如是言諸阿羅漢樂聞非想非非想處相應言論心住其中造隨法行由此於彼隨趣樂著如何引此證阿羅漢不於非想非非想處為欲貪結繫縛其心是故世尊為遮應果貪彼生故説二喻言我等所宗亦許此理何容引此遮應果退此必應遮阿羅漢果造招非想後有行結由此中説彼善男子若得正解心善解脫於所匪宜色等六處眼見等已不隨繫住廣説乃至於彼境中不由尋思隨觀而住不為貪結隨壞其心集感後生惡不善法乃至不集後生老死於自如是能如實知今詳此中所説意者顯諸應果能如實知於後有資糧我終不積集然可説佛於此經中依毒箭喻顯有退理謂佛於此説如是言如有良醫善拔毒箭先觀毒箭入之淺深次設方宜拔之令出後傅妙藥令毒無餘方告彼言咄哉善士我已為汝拔除毒箭令汝身內毒勢無餘汝宜從今謹慎所忌食所宜食時淨其瘡若食匪宜瘡必潰漏乃至善宿於意云何彼蒙良醫拔箭除毒若慎所忌唯食所宜時淨其瘡豈不定得無病安樂氣力增盛由如是喻顯佛良醫拔所化生後有毒箭令引彼結亦盡無餘若於匪宜色等六處眼見等已隨繫而住廣説乃至於彼境中由起尋思隨觀而住煩惱潰漏因此而生若不許然心解脫者有何過起與潰漏同又此經中佛自合喻言若一類能正了知依是病癰毒箭苦本便住依盡無上無依心解脫中斯有是處住已於彼依順取法身取心執無有是處此經於後辨此義言依即是身苦所依故順取即是能益取法以是諸惑所依執故此中有言依即順取如實義者依順取異謂如次第身匪宜境言身取者謂眼等根取匪宜境言心執者謂眼等識執匪宜境樂涅槃者多住涅槃心解脫故於依順取身取心執無有是處今詳此中略意趣者謂諸應果若多安住出離等六心解脫中於六匪宜不隨繫住如慎所忌煩惱不生若不多住出離等六於六匪宜便隨繫住後生毒箭雖已永拔然於眼等煩惱漏生如犯匪宜瘡中潰漏如是上座引此契經但害自宗豈違他義又彼所説諸辨退經皆唯説退增上心所不言解脫此亦不然餘契經中説時解脫阿羅漢退由五因緣不言彼退失增上心所故喬底迦經亦説退失時解脫性阿羅漢果遮彼僻執如前應知炭喻經中亦説有退阿羅漢果如後辨成塢陀夷經亦説有退無漏道果毒箭喻經亦説有退如前已辨彼所引經唯據勝品阿羅漢説故不成證有釋此經佛依自説言與弟子相雜住故不放逸經前對經主已具決擇故亦非證是故上座立無退失阿羅漢果理教並無分別論師作如是説一切聖道皆無有退故所斷惑畢竟不生云何知然由教理故教謂經説告迦葉波若有如是衆多善法我説彼善法無住況有退諸阿羅漢既有如是衆多善法故無有退又契經言如是應果永離垢永究竟無明為因生諸染著明為因故離諸染著諸阿羅漢皆無過罪唯盡故不造新離染無貪已焚有種不復生長諸有萌芽如燒油盡燈便永滅是謂為教復立理言非種被燒有生芽理如是一切多同前破少有異者今別遮遣且彼初教為證不成學位便應許有退故非有學位有多善法與無學同有學位中有成不善如異生故必觀別意經作是説餘經説應果有退不退故若謂説退別約世俗亦應據別説無退言謂餘經中説退無別而許約別説退非餘此無退言雖無差別理亦應許據別為言然此經中所説義者世尊為讚於善法中尊重恆修所獲勝利或意為顯正修善時無住無退非謂恆爾或非應果善法皆同慧解脫等有差別故此中唯據成就衆多勝善法者説無有退翻此有退理在不疑永離垢等如先已釋先釋者何依續後生煩惱垢等密説無過準此應釋盡故等言無明為因生染著等如前無種應無退釋彼所立理墮非理失許後有芽必不生故唯立喻説理不成故或應詰問分別論師汝許以何燒諸煩惱彼定應答以智火燒應復難言此不應理智應依煩惱如火依薪故然不應説無漏智生以諸煩惱為所依附又惑盡位智亦應亡如薪盡時火隨滅故又如薪盡必有餘灰阿羅漢身中應有餘惑故若謂法喻不可全同勿畢竟無同法喻故既爾何故不如是取惑無燒理但少如燒故不應言法全同喻若爾如何説斷惑如燒薪如不更生芽不生後有故由此於退無能遮理正理論者作如是言修道斷惑容有退者此中教理上論文中因破他宗多分已説今為成立自所許宗當復顯示前未説者謂從應果亦有退義炭喻經中分明説故如説多聞諸聖弟子若行若住有處有時失念故生惡不善覺引生貪欲或瞋或癡如是多聞諸聖弟子遲失正念速復還能令所退起盡沒滅離以何為證知此多聞諸聖弟子是阿羅漢何勞徵問由此經言彼聖弟子心於長夜隨順遠離等如餘經説故謂此經內作如是説如是多聞諸聖弟子若行若住或王或親來至其前請受財位廣説乃至由此多聞諸聖弟子心於長夜隨順遠離趣向遠離臨入遠離隨順出離趣向出離臨入出離隨順涅槃趣向涅槃臨入涅槃欣樂寂靜欣樂遠離及出離故我説彼遍於一切順漏法已能永吐已得清涼又此經中先作是説彼觀諸欲如一分炭由此觀故於諸欲中欲欲欲貪欲親欲愛欲阿賴耶欲尼延底欲耽著等不染其心餘契經中説阿羅漢具八力等與此經同謂餘經言告舍利子諸阿羅漢有八種力何等為八謂阿羅漢諸漏已盡其心長夜隨順遠離趣向遠離乃至廣説又彼經中亦作是説彼觀諸欲如一分炭廣説乃至皆如此經復作是言彼已修習已善修習念住正斷神足根力覺支道支戍拏經中説阿羅漢安住出離無害遠離愛盡取盡及不忘失心解脫性毒箭喻經亦作是説佛告善宿樂涅槃者所有非想非非想結爾時皆得永斷遍知由此證知此經所説諸聖弟子是阿羅漢其義決定不應生疑經主此中作如是説實後所説是阿羅漢然彼乃至於行住時未善通達容有此事謂有學者於行住時由失念故容起煩惱後成無學則無起義前依學位故説無失詳經主意謂此經中先説學位後説無學今應審察決定可依為世尊言為經主意然此經內無少依希可引證成前依學位後文方據無學位説謂此經中先説弟子由觀諸欲如一分炭已令欲等不染其心次説有時失念起惑次復説彼速還得離於後即説彼行住時王等來請不受財位由彼長夜順遠離等乃至説彼於順漏法已能永吐已得清涼此經始終都不見佛為説異法亦不見説彼修異行別有所證以何證知彼聖弟子先住學位後成無學今詳此經本為遮止如經主等此妄計度是故先説諸聖弟子由觀諸欲如一分炭能令欲等不染其心此即顯成已證應果次復説彼失念起惑即已顯成應果有退由如是理知此經中初後二文皆説無學又彼所説然彼乃至於行住時未善通達容有此事理亦不然由此經中説彼弟子若行若住隨覺通達有時忘失起煩惱故若謂不説善通達言此亦不然義已説故謂此經説彼聖弟子若行若住隨覺通達有時忘失同諸世間心起貪憂惡不善法豈不已説善通達言若通達言顯善通達如何善通達容更起煩惱此責不然前已説故謂失念故起諸煩惱既爾即應未善通達不爾無忘失唯世尊有故若爾何故契經中言具壽舍利子成六恆住法應知此經説意有二謂顯一切阿羅漢果非皆具成六恆住法或顯一切雖皆具成而非皆能現前安住若異此者世尊不應以此為門顯彼殊勝非苾芻衆知舍利子聲聞衆中智慧第一是大法將能轉法輪而不信知是阿羅漢須薄伽梵以諸應果共有功德讚述勸知又契經中説阿羅漢不時解脫世間希有又説若有補特伽羅成六恆住世甚希有由此證知非阿羅漢於匪宜境見聞等時一切皆能心安住捨及能恆住正念正知故諸應果有忘失念由是彼説此中無有善通達言故知前文説有學位不應正理又若必爾有太過失謂契經説我生已盡不言善盡應是有學又契經説已見聖諦不言善見應是異生又契經言令有路絶不言善絶應非應果此等既不爾知彼説不然故通達言義必有善有餘於此復確執言此炭喻經定説學位云何知然義為依故依何等義謂有學者許有煩惱非無學故無學已斷諸顛倒故惑種無故必無退理又是聖道果所攝故如見斷惑斷無退理詳彼具壽以自所執邪義為依都不欲依善逝所説契經正義如何汝等久匿己情恆矯説言我依經説不以對法正理為依以對法宗有越經故今乃顯露不顧經文隨己妄情橫立義理學正理者作如是言以義為依知説學位豈不雖許以義為依而稱世尊為我師者所立義理不應違經若與經違便非正理若非正理為證不成如何輒言義為依故所言有學許有煩惱於無學退何所相違然此經中不説有學唯説無學前已辨成故知應果有失念退經主所説義最可依非汝隨情妄所執義若唯有學有煩惱故煩惱可生非無學者世尊何故不差別説令所化生起無謬智知失念退學位非餘非佛世尊已超衆過作迷謬説令衆生疑雖此經中無差別説準餘知此説無學位故彼所説是自室言又彼所言無學已斷諸顛倒等證無退因如前已遮故無證用由此無學有起惑退其理極成不可傾動上座於此復謬釋言此炭喻經説不還位以有學位惑垢未除容有遇緣失念起惑非諸無學有起惑理世尊雖説彼於一切諸順漏法已能永吐已得清涼而由但言於諸順漏不言於漏故説無失此不成釋所以者何諸漏亦名順漏法故謂順漏法攝有漏盡理不應言不攝諸漏許此聖弟子於一切有漏已能永吐已得清涼而言未成阿羅漢果曾未聞此悟教理言或應許漏非順漏法則與自執教理相違又彼云何許不還者於有頂地諸順漏法已能永吐已得清涼若此地中諸漏未斷定於此地諸順漏法未得離繫許於此法未得離繫而言於此已能永吐已得清涼如是所言顯慧奇特漏順漏法俱時斷故既説於順漏已吐已清涼則證知彼已盡諸漏故無容釋此説不還又彼所言此經雖説其心長夜順遠離等餘經説此名應果力而要具八方得名為阿羅漢力是故無過以何為證知要具八名應果力一一不然此中都無教理為證但率自意莊飾言詞又彼如何許總具八方得名力一一不然非彼所宗諸阿羅漢許八種力俱時現行故不應言總方成力又非應果此一一法現在前時為諸煩惱之所摧伏闕於力義如何可計一一非力故彼所説定不應理又設許總方得名力而舉一一亦摽應果如戍拏經説阿羅漢唯住遠離無害出離愛盡取盡及不忘失心解脫性毒箭喻經但作是説樂涅槃者永斷非想非非想結豈舉不遍便非應果我今觀彼諸所發言但為令他知己能語如是且舉炭喻契經證有應果退應果性又説應果有二種故如説有二阿羅漢果一者退法二者不退若謂唯退現法樂住理必不然由此經中説有二種阿羅漢故若唯説退現法樂者應唯有一退法應果一切皆有現行退故如契經説我説由斯所證四種增上心所現法樂住隨一有退所得不動心解脫身作證我決定説無因緣從此退若謂唯約退定自在諸契經中説為退法非諸應果皆有此退謂於靜慮現在前中可退自在名為退法若餘事務無暇現前暫不現前不失自在雖有受用退而名不退法是故應果有二義成此救不然以契經説阿羅漢果有二種故又前已説於諸靜慮退自在者於諸欲中若捨遠離應起煩惱若不捨者既於離欲無所退失而言退失離生喜樂豈不相違故於靜慮退失自在理必應有煩惱現前若阿羅漢無起煩惱則應無有失自在定便應一切阿羅漢果唯有一種謂不退法若時解脫是應果性則二應果體不相雜是故我説經説應果有二種故有退理成又説知所斷不生方便故如契經説我如良醫如實了知所治斷法定有於後不生方便由此準知所斷煩惱有更生理故約善知能令所斷不生方便自讚善巧我如良醫若諸世間病愈無發則不應讚唯此良醫善知病愈不生方便故知斷惑有可退生若謂此經約異生説不爾彼説有覺支故謂説我有內念覺支如實知有乃至廣説故知決定不説異生又説應果有二智故如説阿羅漢有盡無生智若諸斷盡皆永不生是則唐勞立無生智若謂為別異生所斷顯阿羅漢安隱第一故依大益立無生智此不應理唯盡智生汝宗許已成第一安隱故又阿羅漢皆自了知我生已盡梵行已立所作已辦不受後有如是安隱豈非第一以諸異生雖得有頂三摩鉢底而有退墮乃至當生惡趣中故唯盡智起已能自知我都無後生更無少所作顯阿羅漢得第一安隱其義已成何藉無生智雖此第一安隱已成而諸應果更起無生智世尊具説盡無生智言由此定知有阿羅漢煩惱已斷恐後更生方便勤求永不生智故立無生智有大益理成由此證知應果有退
