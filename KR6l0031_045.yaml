body:
  text: 尊者衆賢造三藏法師玄奘奉詔譯辨隨眠品第五之一廣辨諸業并決擇已諸契經中説感有處皆言諸業能為引因然見世間有離染者雖亦造善身語意業而無功能招後有果故於感有業應非因業獨為因非我所許要隨眠助方有感能非離隨眠業獨能感故緣起教初説隨眠此復何因隨眠有幾頌曰隨眠諸有本此差別有六謂貪瞋亦慢無明見及疑論曰由此隨眠是諸有本故業離此無感有能何故隨眠能為有本諸煩惱現起為十六事故一堅固根本令得堅牢對治遠故煩惱根本謂煩惱得二生依麁重能辨所依中無堪任性故三建立相續能數令餘連續起故四修治自田令所依止順彼住故五憎背功德性相能違諸功德故六為厭訶本發智所厭訶身語意業故七引毒等流能引如自隨煩惱故八擁解脫路棄背親近正説者故九能發業有發起能招後有業故十攝自資糧能數數攝起非理作意故十一迷於所緣能害自身正覺慧故十二植衆苦種能生一切生死苦故十三將導識流於後有所緣能引發識故十四違越善品令諸善法皆退失故十五廣繫縛義令不能越自界自地以能長養染污界故十六攝世非愛諸增上果因此外物皆衰變故由是隨眠能為有本故業因此有感有能雖離染者亦造善業而無勢力能招後有是故智者應勤精進思擇隨眠速令除滅以何門義思擇隨眠謂觀隨眠此見所斷此修所斷此唯一部此二此四此通五部此是遍行此非遍行此自界遍此他界遍此有漏緣此無漏緣此有為緣此無為緣此云何起云何隨增此由遍知所緣故斷此由斷滅所緣故斷此由永害助伴故斷此由清淨相續故斷此與彼相應此與彼不相應此斷已可退此斷已不可退此有非愛異熟此全無異熟此是彼等無間此是彼所緣此因所緣斷此因所緣不斷此體雖已斷而所緣故縛此於定地無容得有此非世間治道所滅此唯意識身此通六識身此能等起身語二業此能斷善根此能續善根此是見性此非見性此唯九品斷此唯一品斷此一品斷或九品斷此由彼故成就此由彼故不成就此由彼故相應此由彼故不相應此於彼位容有現行此雖未斷而不現行此唯在欲界斷此亦在上界斷有成就此果有不成就此果此同對治此別對治以如是等衆多義門應善思擇諸隨眠相如是善知隨眠相已方能決定除滅隨眠亦能為他無倒顯説自他相續善品更生能速了知遣除方便是故若欲利樂自他應於隨眠如是思擇隨眠差別略有六種謂貪瞋慢無明見疑經主於此作如是釋頌説亦言意顯慢等亦由貪力於境隨增謂契經言因愛生恚如瞋由貪力於境隨增慢等亦由貪故復言亦此釋無理非文意故謂此本為標數列名不明此因彼於境隨增義今詳亦字為滿句言若必欲令此有別義更為方便作無過釋謂瞋如貪雖有多類而可總説為一隨眠慢等亦然故復言亦或此為顯如貪與瞋行相不同是故別立如是慢等行相雖同餘義有殊故亦別立及聲為顯釋據相違或顯總攝隨眠類盡若諸隨眠數唯有六何緣經説有七隨眠頌曰六由貪異七有貪上二界於內門轉故為遮解脫想論曰即前所説六隨眠中分貪為二故經説七何等為七一欲貪隨眠二瞋隨眠三有貪隨眠四慢隨眠五無明隨眠六見隨眠七疑隨眠欲貪隨眠依何義釋為欲貪體即是隨眠為是欲貪之隨眠義於餘六義徵問亦爾經主於此作是釋言此是欲貪之隨眠義然隨眠體非心相應非不相應無別物故煩惱睡位説名隨眠於覺位中即名纏故何名為睡謂不現行種子隨逐何名為覺謂諸煩惱現起纏心何等名為煩惱種子謂自體上差別功能從煩惱生能生煩惱如念種子是證智生能生當念功能差別又如芽等有前果生能生後果功能差別今詳彼釋於理不然自許隨眠離諸煩惱無別物故不染污法為煩惱體理不成故不可説為睡隨眠體故無少物名睡隨眠又若隨眠是煩惱種離諸煩惱無別有物則不應説謂自體上差別功能從煩惱生能生煩惱名煩惱種又彼所執煩惱功能若是煩惱以生為性則不可説此睡煩惱離覺煩惱無別有物若非煩惱以生為性如是生性豈非別物又不應説煩惱睡位説名隨眠若此功能即是煩惱亦非煩惱如是言義曾所未聞若此功能非煩惱性亦非餘性而説是生此極希有無體而許是現在故非無體法可得説言從煩惱生能生煩惱又彼所立宗因相違所以者何謂彼所説然隨眠體非心相應非不相應無別物故今應責彼無別物言為離覺時諸纏自體為離睡位所依自體為離異二第三聚法無別物耶然皆非理彼法非此品類性故又此離彼無別體故又離相應不相應外應別有一違二法生然此第三必不可得故彼所説但有虛言又彼初言然隨眠體非心相應非不相應此言誠實都無體故後不應説差別功能從煩惱生能生煩惱以無體法非因果故又彼此中據何別理唯執煩惱不現行位種子隨逐説名隨眠非餘法種亦立斯號如彼所執亦有心等差別功能從心等生能生心等名為種子何不亦説心等隨眠上座此中立多因證謂隨眠者是諸有情相續所持煩惱類故不由功力恆隨逐故由遍知彼息衆苦故觀彼速能依對治故智者恆觀為病性故如是所立皆非證因許有情身中具五蘊類故或且彼許有業類故心等功能不由功力亦恆隨故契經中言遍知諸法息衆苦故若觀現行纏過失者彼最能速依對治故經言有智應常觀察五種取蘊為病性故誰有鑒者於彼所立證隨眠因心能生喜又隨眠體於自相續既恆隨逐何非現行以現行名目現在故由此經主惡立隨眠又所立喻如念種子是證智生能生當念功能差別亦不相似以我宗言念種子者即於證智後初重緣實念從先證智俱起念生能生後時憶智俱念此顯即念前後相引為能赴感差別功能彼自體俱生無別實煩惱從前纏起能生後纏可名隨眠煩惱種子故喻於法相去極遙由此應知彼第二喻於所況法亦無證能謂芽等中有實色等從前果位實色等生生後果時實色等法彼宗所立煩惱隨眠差別功能無如是事又無芽等同類相續因果俱時有自體中煩惱種子與纏俱義則不應計於自體中煩惱功能從前已滅諸煩惱起猶如芽等從前果生功能差別如斯乃是食米臍宗豈得引來摸託聖旨惡説法者妄所執故況經主論劣甚彼宗謂彼宗中許有別法説名為行是智果因然經主宗無別實物名為種子如何説是煩惱果因故為甚劣上座於此謂佛世尊自説諸纏與隨眠異謂諸煩惱現起名纏以能現前縛相續故煩惱隨界説名隨眠因性恆隨而眠伏故以契經説幼稚童子嬰孩眠病雖無染欲而有欲貪隨眠隨增此唯説有諸隨眠性又説一類於多時中為欲貪纏纏心而住此文唯説有煩惱纏又説一類非於多時為欲貪纏纏心而住設心暫爾起欲貪纏尋如實知出離方便彼由此故於欲貪纏能正遣除并隨眠斷此文通説纏及隨眠由此故知現起煩惱煩惱隨界名纏隨眠若隨眠聲目煩惱得此不應理曾無説故又已除遣別有得故如是隨眠以何為體若彼隨眠以彼為體是隨彼法功能性故或此通用四蘊為體功能隨逐心心所故此相應性亦不相應如諸心所然其自體不可説故而不記別遣此多同破經主義再詳仍有麁過未除且彼敘前宗隨眠聲目得便作是斥此不應理復辨因言曾無説故又已除遣別有得故此因無能隨界同故謂曾無處説隨界名隨眠不説雖同而許得理勝以契經説并隨眠斷故非無實體法可與有俱斷由此已遣已遣得言離得説何為隨眠性而説遣纏位并隨眠斷耶非經部師能定顯示此隨眠性是有可斷又非隨眠體有説隨眠聲故隨眠聲目得無失謂佛但説有七隨眠而隨眠聲有處説色如契經説有色隨眠若覺若思便隨增故如是隨眠得雖非隨眠而説隨眠聲理亦為善又彼所釋前後相違許貪等言説隨眠故謂彼先釋貪等非隨眠後釋經言隨眠即貪等又審思擇上座所宗纏與隨眠斷俱非理是故應捨隨眠異纏俱非理因如後當辨今引違彼前所引經謂有經言汝今何故喬答摩所修梵行耶為求斷故求斷何法斷貪瞋癡及三結等此中不別説斷隨眠上座此中作如是釋此中貪等即是隨眠豈不前言并隨眠者是隨眠得非目隨眠不爾二經應相違害曾無説故已顯非理非經部宗經有斷義心相應故去來無故非隨眠斷故纏後不生名斷經説并斷言顯二俱時斷故又此經説纏勝隨眠先説遣纏并隨眠故不爾應説隨眠并纏若斷隨眠纏方斷者則隨眠勝理應先説又隨眠未斷纏容有不生故非不生即名為斷或纏不生位即得斷名非隨眠斷故纏方名斷或應隨眠斷纏方不生非於未斷時有不生理彼隨眠體亦無斷義無別物故如空花等又彼所説若彼隨眠以彼為體是隨彼法功能性故此亦非善若欲貪纏所引隨眠即欲貪者學心應與欲貪體一與彼隨眠無別體故學心是學諸欲貪纏非學無學如何可説若彼隨眠以彼為體又隨眠位諸欲貪纏已滅無體如何可説有欲貪隨眠以欲貪為體故彼所説有言無義又彼所言或此通用四蘊為體功能隨逐心心所故亦不應理欲貪隨眠體無差別執差別法以為自體非觀理者生喜處故又受想識欲貪所隨即説名為欲貪自體亦非鑒者生喜處故又彼所説此相應性亦不相應如諸心所彼言如有不識槃豆時縛迦花拘枳羅鳥有作是問拘枳羅鳥其色如何答言鮮白正似槃豆時縛迦花曾無處説亦無理證諸心所體是不相應寧説隨眠如諸心所是相應性亦不相應若作是言心所自體異類行相則不相應所許隨眠與隨眠體異類行相既得相應則不應言諸隨眠體如諸心所亦不相應又不應許諸心所法有不相應非待相應方建立有不相應故又彼所言隨眠自體不可説故而不記別誠如所言彼宗隨眠猶如馬角不可説故以要言之彼宗所執多分無有實體可記欲於佛教求正解者不應習近如是論師以聰慧人習彼論者所有覺慧皆漸昧劣彼論所説多不定故前後義文互相違故不任詰故越聖教故對法諸師咸作是説欲貪等體即是隨眠如契經言若觸樂受便生欣悅慶慰耽著堅執而住即於樂受有貪隨眠此中隨眠聲即説欣悅等經主此中作如是釋經但説有不言爾時即有隨眠何所違害於何時有於彼睡時或假於因立隨眠想此釋非理爾時隨眠説現有聲理不成故謂非正起貪纏剎那有貪隨眠可説現有即於樂受有貪隨眠言顯樂受中現有隨眠故又隨眠自體應不可知故謂經所説有隨眠聲若有性俱若即有性於無體法理俱不成無非有俱及有性故又經但説有隨眠言寧知非爾時於餘時方有有謂有體是現有義如契經説於諸欲中若有欲貪心被縛住乃至廣説又如經説有諸有情於可愛境有欲有貪乃至廣説豈亦執此有及縛言非於爾時餘時有縛又如經説此無故彼無豈亦可言是餘時無義故經主釋定為非理由此已遣於因假立謂經但説有隨眠言寧知説因非隨眠體又隨眠體爾時無故不應於有立非有名故知隨眠即欲貪等於自相續隨增眠故然我今釋大母經中欲貪隨眠即欲貪體非此意辨諸隨眠得欲貪隨眠所隨增者是隨縛義如何隨縛非由自體由起得故如強怨敵雖住遠方密遣使隨伺求瑕隙故本論釋總隨眠名謂恆隨行及恆隨縛此説起得非顯得體又即彼經言并隨眠斷者顯欲貪纏無餘盡義謂斷八品修所斷時一品隨眠猶能隨縛為顯體斷説正遣除并隨眠斷言顯隨縛皆盡如契經説於此所生無量種類惡不善法無餘永滅并隨縛斷此意亦顯并隨眠滅是故隨眠即欲貪等非隨界等其理善成分別論師作如是説諸隨眠體是不相應不覺不思有隨眠故謂契經説不覺不思亦為隨眠隨增隨縛又道煩惱應俱時故謂聖道起與心相應若斷與心相應煩惱則應聖道有煩惱俱又應非無學亦無煩惱故謂執隨眠心相應者異生有學善無記心現在前時應無煩惱然非所許故知隨眠是不相應行蘊所攝此可破經部非預我宗我宗許去來有實體故謂雖現在不覺不思而為去來覺思所引諸隨眠體與心相應實相隨眠隨增隨縛乃至未斷覺思等前於相續中恆現起得隨增隨縛曾無間斷由此亦無道惑俱失亦無非無學有無煩惱過以煩惱得非煩惱故由此去來煩惱縛故如汝宗聖者現起煩惱時無煩惱道俱及成異生過我宗有學起聖道時無道煩惱俱及無煩惱失又何用執此不相應以能為因生諸纏故此不應理曾無説故佛説煩惱但以無明相不律儀非理作意邪分別等為因故生不説隨眠為因故起然分別論及經部師妄執隨眠為纏因性又此所計有太過失謂若隨眠為纏因故執隨眠體是不相應經説無明因謂非理作意此非理作意應是不相應此不許然彼云何爾又隨眠體若許相應可能為纏隨眠因性非餘妄計不相應者以契經説諸有苾芻於彼彼事中若多起尋伺由此由此心便沈著又如是理世現可知以下欲貪先數現起後便數起上品欲貪又若隨眠非相應性唯此能作貪等纏因未離欲貪諸有情類若遇境界纏起應同以現生因無差別故既不許爾故執隨眠與纏為因定為橫計然隨眠體定是相應以經説隨眠為歡悅等故謂前所引契經中説若觸樂受生歡悅等即於樂受有貪隨眠非不相應名歡悅等又經説隨眠映蔽心等故謂契經説貪映蔽心由此便能行身語意惡行若隨眠體是不相應應一切時造諸惡行又契經説心受貪染若隨眠體是不相應應不染心或應恆染若謂所引皆是諸纏此中並無隨眠聲故如何不謂皆是隨眠以於此中無纏聲故又彼所釋違害自宗若無隨眠聲即執為纏者如契經説無明為因生貪瞋癡亦應執纏為因生纏非隨眠力是則違害先所立宗隨眠為因生諸纏義又隨眠體若不相應彼與善心為相違不若相違者則諸善心應畢竟不生隨眠恆有故不相違者則諸隨眠應不染惱心然經説染惱如契經説貪染惱心令不解脫無明染慧令不清淨若謂貪染惱非貪隨眠以何理為因證知如是如貪染為性能染惱心如是貪隨眠亦染為性如何不説能染惱心又如愛結體即是愛能染惱心應貪隨眠體即是貪亦能染惱或彼應辨差別因緣由何愛結是相應性貪隨眠體是不相應佛觀有情意樂差別於諸煩惱立種種名如一欲貪説名欲漏欲取欲扼欲貪隨眠欲瀑流貪欲蓋愛結等種種名於一欲貪差別名內若隨眠體是不相應執是欲貪之隨眠者則欲漏等應不相應亦應執為欲之漏等若欲漏等非不相應應許隨眠是相應法等是欲貪名差別故由此理證欲貪隨眠體即欲貪能為染惱以契經説貪染惱心令不解脫故不可執隨眠恆有是不相應以諸善心容有起位故隨眠體定是相應經主此中先敘尊者法勝所説以諸隨眠染惱心故覆障心故能違善故非不相應後即斥言此皆非證許隨眠體是不相應不許隨眠為上三事但許三事是纏所為此都未詳彼大德意彼大德意如我先辨若謂隨眠如煩惱得體雖恆有不障善心此亦不然隨眠煩惱差別名體曾無説故且分別論執隨眠體是不相應可少有用彼宗非撥過去未來勿煩惱生無有因故然犢子部信有去來執有隨眠非相應法如是所執極為無用如彼論言諸欲貪纏一切皆是欲貪隨眠有欲貪隨眠非欲貪纏謂不相應行欲貪隨眠何緣彼部作如是執以經論文俱可得故釋彼一切皆如前説若但如文而取義者如契經説有色隨眠此文亦應不別觀察解釋理趣如文而取則隨眠體非唯可執通相應性及不相應亦應執通有色無色有見無見等種種差別門又彼何緣憎背諸得若信有得具能釋通諸聖教中幽隱文義諸邪執類不能如實設難彈斥信有得宗執不相應隨眠論者常為無量過難所隨不能釋通聖教文義而固方便背正執邪未審蘊何在心故爾何勞徵問以諸世間得及前因無始皆等而現見有唯貪猛利廣説乃至有雜行者非無別因有如是事故應由別有不相應隨眠此亦不然若信實有去來二世雖不別立不相應行名為隨眠貪猛利等皆得成就謂由近遠二同類因境等別緣資助覺發令其引果勢力別故且止廣諍如契經言有貪隨眠此何為體色無色愛佛説有貪此名何因唯於彼立彼貪多託內門轉故謂欲界貪多於欲境外門而轉不名有貪上二界貪多於定境內門而轉故名有貪又由有人於色無色起解脫想為遮彼故謂上二界有求解脫妄想為先得生於彼故有計彼為真解脫佛為遮其真解脫想故於上界立以有名貪二界貪立有貪想夫言有者是生身義此則顯示欲求解脫於一切有不應希求經主於斯復作是釋此中自體立以有名彼諸有情多於等至及所依止深生味著故説彼唯味著自體非味著境離欲貪故由此唯彼立有貪名此釋與前義有何別謂前已説上二界貪多於定境內門而轉又説有人於色無色生身有境起解脫想則為已説定及生身皆得有名俱自體故詳經主釋義不異前但搆浮詞似有少異上座説有二類隨眠一唯欲纏二通三界自興疑問豈不有貪有論説言唯上二界都無聖教於色無色偏説有聲故難依信然於處處諸聖教中皆以有聲通説三界豈不於境亦説有聲欲貪隨眠不應別立此難非理轉有異故謂諸欲貪於外門轉內門轉者説名有貪又如耽境與耽有異所引隨眠差別亦爾又緣境界緣生身貪對治不同故別立二又必損伏欲貪及瞋外仙方能入色無色故欲貪體非即有貪以彼有情緣自相續我愛隨逐恆無斷故上座於斯極為惡立隨眠差別以欲貪聲容説一切欲界貪故欲界生身亦欲界攝如何緣彼貪非欲貪如説色貪非唯緣色總説一切緣色界貪如是欲貪非唯緣欲總説一切緣欲界貪上座所持契經亦説若緣欲界起染起貪起阿賴耶起尼延底起諸耽著是欲貪相故執有貪通三界者非為善執又非佛説唯通三界可説有聲所以者何有聲或説一界少分二界少分三界少分如七有經極七有等如應配釋故此所説欲貪隨眠通攝一切欲界貪盡餘二界愛總名有貪立名因緣如先已辨若唯緣內貪名有貪則色界中色聲觸愛非緣內起應非有貪則諸隨眠應立有八又言有者不唯生身以契經中説業有中有故如欲有聲兼説欲境如是欲界緣生身貪亦是欲貪隨眠所攝是故一切欲界繫貪皆以欲貪隨眠聲説或於欲境亦説有聲欲貪隨眠別説無用言轉異故理亦不然説多分言容可爾故謂約多分理則可然以欲界貪多外門轉色無色愛多於內門非執欲貪唯緣外起唯緣內起方名有貪可説二貪轉異故別或彼應許色無色貪一向無緣外門轉者又諸耽境即是耽有以諸境界亦名有故或諸耽有即是耽境諸有亦為境界攝故由此所言又如耽境與耽有異非為善説又彼所説由境身貪對治不同別立二者此言對治為別為通若謂此言約別對治即境界貪應分多種謂色聲等諸境界貪制伏對治各有異故若謂此言約通對治此二對治有異有同如何定言對治有異或色無色二界中貪治有不同應亦分二又言損伏欲貪及瞋外仙方能入色無色故欲貪體非即有貪以彼有情緣自相續我愛隨逐恆無斷者此言極與聖教理違唯不現行名為損伏若欲界繫緣生身貪亦名有貪亦名我愛若此我愛恆隨現行彼定無容入色無色若不損伏下生身貪而諸外仙容入上地則不應説伏欲貪瞋外仙方能入色無色若謂現起欲境貪瞋能障外仙入色無色非欲界繫緣生身貪能障外仙此有何理厭下身境方生上故雖彼復言豈不乃至阿羅漢向住欲界者於欲界身有我慢愛必無是事或何不許阿羅漢果亦有是事若離欲界染不斷欲界貪離有頂染時亦應無斷理由彼於此非對治故或應一切下地煩惱與有頂染俱時斷滅修前治道便為無用或應説彼差別因緣等欲界貪斷有漸頓若謂此證由安隱經不爾不了彼經義故謂彼具壽已見諦理依修所斷欲界所繫我愛我慢故作是言我色等中不隨執我然於如是五取蘊中有我慢愛隨眠未斷謂此煩惱隨身見行身見斷故此不現起然猶未永斷未得對治故作如是釋何所相違有所相違謂彼經説佛為彼説此法門時具壽安隱成阿羅漢諸漏永盡心善解脫由此知彼先是不還曾已進修阿羅漢向於出觀位作如是言我色等中乃至廣説佛為説法經但言成阿羅漢果不言餘故此不成證彼契經中偏舉所得最勝果故如拊掌喻契經等説非諸聖者作是尋思我我似何乃至廣説世尊方便開悟其心經但言成阿羅漢果謂經説彼悟佛所言成阿羅漢心善解脫非説異生聞法頓證阿羅漢果作是説者偏舉最勝此亦應然或彼契經約取蘊類作如是説然於如是五取蘊中有我慢愛隨眠未斷理實但有上取蘊中我慢我愛自稱釋子必不應言已離欲貪猶有欲界我慢我愛隨眠未斷況言此二恆隨現行是故有貪唯色無色非於欲界其理極成既説有貪在上二界義準欲界貪名欲貪故於頌中不別顯示
