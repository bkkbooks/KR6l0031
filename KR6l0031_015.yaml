body:
  text: 尊者衆賢造三藏法師玄奘奉詔譯辨差別品第二之七如是已辨不相應行前言生相生所生時非離所餘因緣和合此中何法説為因緣且因六種何等為六頌曰能作及俱有同類與相應遍行并異熟許因唯六種論曰本論許因唯有六種不增不減一能作因二俱有因三同類因四相應因五遍行因六異熟因能作因體通一切法是故先説俱有因體遍諸有為故居第二餘同類等於有為中如其所應各攝少分隨言穩便次第而説法生所賴故説為因如是六因非佛所説如何本論自立此名定無大師所不説義阿毗達磨輒有所説經中現無由隱沒故自相可得決定應有又諸經中所化力故世尊方便作異門説對法諸師由見少相知其定有分明結集故有説言此六因義説在增一增六經中時經久遠其文隱沒尊者迦多衍尼子等於諸法相無間思求冥感天仙現來授與如天授與筏第遮經其理必然如四緣義雖具列在此部經中而餘部中有不誦者由時淹久多隱沒故既見餘經有少隱沒故知此處亦非具在又見經中處處散説故六因義定應實有謂如經説眼及色為緣生於眼識又如經説二因二緣能生正見諸如是等即能作因諸法於他有能作義由生無障故立此因如契經説有三道支正見隨轉又如經説三和合觸俱起受想思諸如是等即俱有因諸行俱時同作一事由互隨轉故立此因如説如是補特伽羅成就善法及不善法應知如是補特伽羅善法隱沒惡法出現有隨俱行善根未斷以未斷故從此善根猶有可起餘善根義又説苾芻若於彼彼多隨尋伺即於彼彼心多趣入無明為因起諸染著明為因故離諸染著諸如是等即同類因過去現在同類諸法由牽自果故立此因如契經説見為根信證智相應又如經言若有了別即有了知在定了知乃為如實非不在定諸如是等即相應因心心所相應同作一事由共取一境故立此因如契經言諸邪見者所有身業語業意業諸有願求皆如所見所有諸行皆是彼類如是諸法皆悉能招非欣愛樂不可意果又經説一切見趣生時皆以有身見為其根本若此見生不忍一切此見能生貪欲瞋恚諸如是等即遍行因過去現在見苦集所斷疑見無明及相應俱有於同異類諸染污法由能引起故立此因一部為因生五部果故同類外立遍行因如契經言若所作業是善有漏是修所成於彼處生受諸異熟又如經言諸故思業作及增長定招異熟諸如是等即異熟因一切不善善有漏法由招異類故立此因如是六因佛處處説諸憎背者迷故不見又薄伽梵處處經中説有俱生前生因義依此有彼有此生故彼生如次應知前二因義又薄伽梵於契經中分明顯説二種因義謂契經言諸有不敏處無明者由無明故亦造福行此經即顯有前生因又契經説眼色為緣廣説乃至意法為緣生癡所生染濁作意此中愚者癡即無明希求即愛愛表即業此經即顯有俱生因一心中説有展轉為因故至義次第當復決擇已略舉因今當廣辨且初能作因相云何頌曰除自餘能作論曰此能作因略有二種一有生力二唯無障諸法生時唯除自體以一切法為能作因由彼生時皆不為障於中少分有能生力且如有一眼識生時以所依眼為依止因以所緣色為建立因以眼識等如種子法為不斷因以相應法為攝受因以俱有法為助伴因以耳根等為依住因此等總説為能作因於中一分名有力因以有能生勝功能故所餘諸分名無力因以但不為障礙住故雖餘因性亦能作因然能作因更無別稱如色處等總即別名何故自體非自能作因以能作因於自體無故謂無障義是能作因自於自體恆為障礙又一切法不待自體應有恆成損減等故有餘師説若有自體因自體者即應無明還緣無明乃至老死還緣老死一剎那頃此即此因是則乖違緣起法性有餘師説自於自體不見有用故非因緣猶如指端刀刃眼等若除自體餘一切法與此一法為能作因則無間業亦與聖道為能作因如何應理又唯生時由無障住可能為因應非餘位非彼與此有時為因有時非因可應正理聖道生位彼定為因故於餘時非無因義若於此生彼能為障而不為障可立為因然於此生無障用者設不為障何得為因由一切法展轉相望皆有障力故得為因謂於是處有此一法是處無容更有第二設復此法於餘處有彼亦無容更有餘法如是諸法豈不相望皆能為障而不為障故皆可立為能作因無色亦有時依等定故彼相望亦有障力又諸法內一法生時如與欲法餘皆無障謂二緣故法不得生一順因無二違緣有諸法生位必待勝力各別因緣及待所餘無障而住增上緣法由能生因有能障因無諸法乃生故唯由無障礙説一切法名為能作因非有障力而不為障與無障力不為障者於無障時少有差別俱有無障力同無勝用故由斯已遣諸有難言若一切法無障住故皆能作因何緣諸法非皆頓起一殺生時何緣一切非如殺者皆成殺業但由無障説彼為因無勝用故灰刺等觸為樂受因如何應理非灰等觸為樂受因是因因故謂同類故苦受得與樂受為因因灰等觸生於苦受故為因因如是見等展轉相望有少功能皆應顯説由前略指觸受方隅餘例可悉無煩廣辨故能作因望所生果非唯無障亦有生力然闕親因及因等起故一切法不可頓生非如殺者皆成殺業過去諸法與餘二世為能作因彼二世法還與過去為增上果未來諸法與餘二世由無障故為能作因彼二世法非俱後故不與未來為增上果果必由因取故唯有二因唯據無障故許通三現在諸法與餘二世為能作因彼二世中唯未來法為現在果有為有為是因是果有為無為非因非果無為無為非因非果無為有為是因非果由此義故説如是言能作因多非增上果以一切法皆能作因唯諸有為是增上果如是已辨能作因相第二俱有因相云何頌曰俱有互為果如大相所相心於心隨轉論曰若法更互為士用果彼法更互為俱有因展轉助力而得生故其相云何如四大種更互相望為俱有因雖有體增體不增者而皆三一更互為因自體不應待自體故亦不應待同類體故一一大種唯待餘三要四大種異類和集方有功能生造色故如是有為相與所相心與心隨轉亦更互為因是則俱有因由互為果遍攝有為法如其所應此中所説因相太少謂諸心隨轉及諸能相各應説互為俱有因故又不應説唯互為果為俱有因法與隨相非互為果然為因故此為因相彼應更辨由此義故應辨相言有為法一果可為俱有因本論説故此無過失然本論中曾不見説心隨轉色與心為因應辨此中造論者意或有師言是有餘説彼顯論過非謂辨成言義闕減名論過故復有師言此中論者非為具辨俱有因相但為遮遣餘宗所執謂為遮遣執唯有心故説離心有諸心所又為遮遣執業唯思無無表業是故復説有心隨轉身業語業復為遮遣執生等相非實有物是故復説有心隨轉不相應行豈不具辨俱有因相轉更顯成別有心所身語無表及生等相又於餘處曾未具辨俱有因相今不具説便成闕減故彼應思我於此中見如是意若法與心決定俱起遍一切心依心而轉即説彼法與所依心展轉相望為俱有因諸心所法非定俱起或少或多現可得故身業語業非遍諸心不定心俱全無有故生等諸相皆依心轉非互相依生等皆以法為上首互相資故由斯不説彼互為因又於此中為欲顯示但説異類為俱有因同類互為因不説而成義又為顯示有身語業唯依於心不依於表故不説彼與心為因又彼大德意趣難了諸有智者尚未善知故於此中有作是計唯心能與心隨轉色為俱有因非色與心從心生故依心起故如王與臣勝不因劣此計非理如臣與王防衛任持互有力故心隨轉法其體云何頌曰心所二律儀彼及心諸相是心隨轉法論曰一切所有心相應法靜慮無漏二種律儀彼法及心之生等相如是皆謂心隨轉法何因不説彼之隨相不説所因後自當辨何緣此法名心隨轉頌曰由時果善等論曰略説由時果等善等十種緣故名心隨轉且由時者謂此與心一生住滅及墮一世由果等者謂此與心一果等流及一異熟由善等者謂此與心同善不善無記性故豈不但言一生住滅即知亦是墮一世中雖亦即知墮於一世而猶未了此法與心過去未來亦不相離或為顯示諸不生法故復説言及墮一世若爾但應言墮一世不爾應不令知定墮一世豈不等流異熟亦是一果攝如何一果外説等流異熟耶實爾此中言一果者但攝士用及離繫果豈不此言通故亦攝等流異熟雖言亦攝非此所明然士用果總有四種俱生無間隔越不生此顯與因非俱有果為遮唯執與因俱生和合聚中有士用果此和合聚互為果故自非自體士用果故即顯非彼俱起和合士用果中有一果義是故別舉等流異熟應知此中時一果一顯俱顯共其義有殊此中心王極少猶與五十八法為俱有因謂十大地法彼四十本相心八本隨相名五十八法五十八中除心四隨相餘五十四為心俱有因何緣心隨相非心俱有因不由彼力心得生故心非與彼互為果故彼於一法有功能故又與心王非一果故聚中多分非彼果故即由如是所説多因隨相不名心隨轉法若爾云何心能與彼為俱有因由隨心王生等諸位彼得轉故豈不應知大種生等心亦用彼為俱有因謂如造色非生等果生等非不與諸大種為俱有因此亦應爾如是所例其理不齊展轉果一果多非彼果故非諸造色是諸大種展轉果中一果所攝何容造色非諸大種生等果故例此為失又如前説前説者何不由彼力心得生故然諸大種與生等相展轉力生故無此失有餘師説五十八中能為心因唯十四法謂十大地法并心四本相非諸心所生等相力能為心因如心隨相若爾便違品類足論如彼論言或有苦諦以有身見為因非與有身見為因除未來有身見及彼相應法生老住無常諸餘染污苦諦或有苦諦以有身見為因亦與有身見為因即所除法彼作是言我等不誦及彼相應法應隨義理簡擇論文方可誦持故異此便壞俱有因相或應許隨相亦心俱有因復有説言一切同聚皆互相望為俱有因於同聚中隨闕一種所餘諸法皆不生故此諸説中初説為善又此俱起和合聚中有是能轉而非隨轉謂即心王有唯隨轉謂色及心不相應行有是能轉亦是隨轉謂心所法隨心轉故能轉心不相應行故有二俱非謂除前相云何俱起諸法聚中有因果義何故知無俱起諸法於將生位既非已生並應未有如何可説能生所生又説有因則有果故若未來世諸法能生應有諸法恆時生過又俱生法此果此因無定因證如牛兩角又諸世間種等芽等極成因果相生事中未見如斯同時因果故今應説云何俱起諸法聚中有因果義今當且為辨因果相即令知有俱生因果謂前略舉諸因相中引薄伽梵處處經説依此有彼有此生故彼生與此相反非有非生如是名為因果總相此中初顯俱生因義後文復顯前生因義若爾決定無俱生因以薄伽梵説依此有彼有未來無故何得為因此責不然無有多種故未來非無故後當廣辨又此契經證未來有或復彼應説不違理經義此中上座釋經義言依此有彼有者此説有因相續為先然後有果相續而住誰生為先誰生已住為答此復説此生故彼生此顯因生為先故後果生而相續住如是上座但率己情妄解佛經以扶己義如是解釋佛所説經無有定因堪為證故謂何定因為證依此有彼有言但據因果相續而説不據一一因果剎那依有一念因即有一念果此順正理非因相續後方有果相續違正理故又彼所説無別勝理非覺為先而作是釋不能開顯經之妙義若謂剎那因果難覺故據相續因果説者此亦不然無容有故謂無容有不隔果剎那因相續而起亦無容有不隔因剎那果相續起故若如彼釋應顯世尊説非如理或應不據相續因果而説此經彼如是釋令緣起義難可了知是故彼應於此經義更作餘釋又彼何理定判前經依相續説後經不爾後經亦應得作是釋此生故彼生者此説有因相續為先然後有果相續而住非彼宗有與生義別如非將生時與將起時異又所疑問誰生為先誰生已住亦不應理前後二門不相待故二門所待義各異故非前所説依此有彼有復待後説此生故彼生謂前已説依此有彼有不待疑問誰生故彼生并待後釋因生故果生前義方了如後所説此生故彼生要待疑問誰生故彼生復待別釋因生故果生義即明了如是前説依此有彼有亦待疑問依誰有彼有復待別釋依因有果有義即明了是故前後所待各別故我所説初經為顯俱生因義後經復顯前生因義其理極成彼復異門釋此經義前經為顯諸行有因後經為遮計常因執此亦非理但説後經如是二門皆成就故謂經但説此生故彼生二事俱辨由説因果相繼而生顯行有因遮無因論由生言故顯無常因亦即能遮説常因論諸常住法必無生故既由後説二事俱成則説前經便為無用非薄伽梵説無用經故知二經非如彼釋設許如是解釋前經亦不乖違俱生因義謂即依此俱生因有而能令彼俱生果有豈不由此顯行有因亦即能遮執無因論如後所説此生故彼生由此能顯因是無常亦即能遮説常因論而不違害説前生因如是前説依此有彼有由此能顯諸行有因亦即能遮説無因論而不違害説俱生因又前生因正居有位未來無故都無所生彼宗自説未來無故既無所生如何善逝分明顯説此有彼有如此有言是差別説所説有義現有極成故彼有言亦差別説所説有義亦應現有此彼異因不可得故如是同喻彼此極成如言彼色居正滅位又曾無處於極成無作差別説言彼是有如何可於未來無法作差別説言彼是有於差別説而説為無如是所言違害正理又未來法許有因故雖無作用而體應有若彼不許未來有因應許畢竟無同兔角既許有因亦必應許未來體有異畢竟無諸所言無義有多種未生已滅畢竟互無初二言無但無作用故未來世非體全無得有能生及所生義於正生位作用雖無而有功能生所生法又我不許諸未生因及已生因是真作者諸法無有真作用故真作用者謂諸因緣於所生果常能造作此真作用非佛所許然諸法生互相繫屬隨有所闕餘則不生非此不生彼有生義依如是量説此為因此因功能非恆時有故無諸法恆時生過又我不許唯俱生因不假餘因能生諸法故無諸法恆時生過又唯説有前生因者於如是過豈獨言無彼前生因恆時有故應一切法一切時生隨有許因能生諸法皆可施設如是過難然妄執有隨界論者彼執恆現有無量法生因豈不汝宗獨為諸法於一切時頓生過害若汝雖執唯前生因而待餘緣方能生果何故不許此俱生因亦待餘緣方能生法如汝所執唯前生因能生諸法然不恆生未來亦爾不應為難言俱生法此果此因無定因證如兩角等皆非應理現見兩角隨一壞時餘不壞故若隨一壞餘亦壞者可比相生如心心所又我不許一切俱生皆有展轉為因果義許有者何謂共一果或展轉果方有此義或由此力彼法得生如是俱生有因果義非牛兩角有上所説故不可引為同法喻又對法者非許俱生互為果法有決定量謂此唯因此唯是果但許如是和合聚中一切相望皆因皆果故不應責因果定因又如唯説前生因者許有少分前生非因非諸前生皆無因義如是説有俱生因者亦許少分俱生非因非諸俱生皆無因義又有別喻證俱生因故彼立因有不定過謂世現見燈之與明俱時而生有因果故復何因證燈是明因謂明隨燈或增或減或住或行有差別故又欣明者便取燈故又厭明者便害燈故我亦許明因燈而起然不許彼因俱起燈所以者何燈明俱起不可待燈明方生故非俱生法相待應理如非自體待自體生但由前生燈為緣故無間後念明乃得生是故不應引之為喻此亦非理燈初起時有燈無明不可得故謂曾未見有時有燈而無有明故為非理若謂時促不可得者此亦不然非極成故若有少分無明之燈世極成立或有責彼不得之因容可答言由時促故此不可得然無少分無明之燈世極成立故不應説由時促故為不得因若許燈明恆俱起者彼不應説燈是明因由燈與明一因生故謂油炷等與燈為因即此亦應為明因故如是二種既一因生如燈不因明故得起明亦應爾非因燈生復有喻故不相因起如苣蕂中皮人與膩三事和合一因生故非展轉因世極成立燈明亦爾一因生故明必不應用俱起燈為因燈明不應同一因起如皮人膩在苣蕂中不見苣蕂皮人膩合同一因生得為因果燈明二種現見在前相隨等因證有因果故不可説同一因生又一為先俱生諸法因有差別是極成故謂共現見一種為先所起芽中俱生諸法色香味觸因各別故既一芽中色香味觸俱時而起因各有殊故知燈明俱時而起亦應如彼非一因生若燈與明一因生者或有以物掩蔽燈時明應如燈非不相續燈如明故應亦不生非苣蕂中皮人膩合一因起位見有隨一緣礙不生餘尚得起燈明不爾故因不同若謂燈明體無別者亦不違害我俱生因又焰與明非同法故其體各異由前所説相隨等因得為因果故燈明喻其義極成又見厭背受想二法入滅定者思等心所亦如受想皆不得生説此定中意行滅故由此準度驗思等生繫屬受想故知諸法前生因外有俱生因然上座言思等心所於滅定中不得生者由與受想生因同故非由展轉為因生故何謂為彼所同之因若謂是觸此位應有彼許滅定中有心現行故若是所依此位亦有一切心所法皆依識生故同因既有彼何不生又應退失前後生論許觸與識為彼因故由此不應説與受想生因同故思等不生又見因雖同而不俱生故知必俱生者定展轉為因謂由眼色前生識故無量眼識皆可得生此生因雖同而不俱起者由不展轉為因生故唯因前識後識得生非因後識前識生故由此驗知生因雖共不相因者未必俱生若必俱生定相因起俱生因義由此極成又前已説芽中色等俱時而起因各有殊故知生因雖不同者亦有展轉俱時起義是故俱起及不俱起非定由因同與不同又説心心所同一因生亦説俱生時有因果故謂説心所及與眼識同用眼色為因而生故契經説眼色二為緣生諸心所又契經説眼及色為緣生於眼識如是二經説心心所同一因生復説同時諸心所法依心而生故契經説若想若思諸心所法是心種類依止於心繫屬於心依心而轉非諸心所心不俱生有依屬心依心轉義非無與有可成能依所依性故如是之義後當更辨是故決定有俱生因又俱生因若定無者應立大種造色不成謂若大種及眼等造色唯依前生大種而生者大種眼等同用一具大種為因何緣造色唯是眼等非諸大種又應違經謂薄伽梵對無衣者作如是言我終不説受衆苦者無因無緣有苦生起若執諸法唯有前生因無俱生因者彼即應説有因緣時無苦生起苦生起位因緣已無是則違前契經所説又應違害緣起正理如契經説眼色為緣生於眼識前生眼色與後眼識應非所依及非所緣有無有故非畢竟無可説此是所依所緣此亦應爾彼眼識生時眼色已滅故應無緣力眼識自生無法無容為所依故眼識唯緣現在境故若眼色識不俱生者則應眼色非眼識緣或耳聲等亦眼識緣同與眼識非相屬故若薄伽梵唯説前生眼色為緣生眼識者則應説眼識唯用識為緣自類緣強如種子故前識為後識等無間緣故既不説識為眼識緣故知此中唯説俱起眼根色境為眼識緣非一身中二識俱起故不説識為眼識緣若謂此中唯説眼識不共緣者前生眼色與耳聲等不屬眼識義無別故何唯眼色為不共緣非耳聲等又必應爾由第六識無別俱生所依緣故但説前起意為依緣意識得生非如餘識又諸識緣非唯前起以契經説意法為緣生於意識意識通以三世無為為境界故由此決定有俱生緣理極成立又此經言三和合觸分明證故若眼識生眼色已滅眼識爾時與誰和合若言五觸如意觸者此亦不然意識力強通與諸法有和合故意識依境雖不俱生而體非無有和合義我宗三世及三無為皆實有故汝宗唯有現在世法合義不成又諸憎背俱生因者初無漏法從何因生彼前生因曾未有故若謂淨界本來有者因既恆有何緣障故無漏果法曾未得生若言更賴餘緣助者即此所賴何不為因又應唐捐作如是責謂何不執自在天等若言要待相續轉變理亦不然此與淨界若異若一皆有過故謂若異者應同前難即此轉變何不為因如何復執淨界為種或應唐捐作如是詰如服瀉藥天來令利若言一者前後既同應畢竟無生無漏用然彼前後無差別因不可無因自有差別若言如種待緣轉變同類種子有地等緣和合攝助可有相續待時方成轉變差別所執淨界無漏法種若是有漏執此唐捐有漏法不應為無漏種故無漏法亦不應為有漏種故若是無漏如何本來成就聖道而墮惡趣豈成聖道而是異生非聖位中不起聖道爾時可得名異生故若言少故無斯過者勿彼能為無始積集堅固煩惱對治生因又更無勞難譬喻者契經已遮彼所執故如世尊説我實不見提婆達多白法猶成如毛端量乃至廣説世尊自説天授身中白法根種無餘已拔故此經內復作是言有隨俱行善根未斷以未斷故從此善根猶有可起餘善根義彼於後時一切皆斷今應説彼除此善根更復有何非無餘拔而於佛教所説義中無顧忌心不能信受不可聞説大木聚中有淨界故即説有情身中亦有太過失故如大木聚隨他所欲成淨成染有情亦應許隨他欲或從淨界無漏法種生聖法已復隨他欲還成異生又亦應執諸阿羅漢退法種性有煩惱種無學有退後當成立又上座説諸行決定無俱生因諸行將生應無因故又應餘類生餘類故謂俱生法於將起位非此與彼能作生因猶未生故又應求彼二種異因由彼二因二俱得起此説非理無證因故是所許故謂俱生法將生位中此非彼因未説因證豈不已説猶未生故此亦同疑謂何因證猶未生法不能為因又彼如何於無體法倒許為因非有體法若謂未生體非有者體若非有勿謂有因非兔角等畢竟無法可説有因此亦應爾汝亦不許兔角非無又我所宗有有多種體用假實有差別故未來雖有而引果用猶未有故説為未生體既非無何無因義不説因證而執未生非法生緣不應正理若未生故不得成因生故成因是則應許過去諸法定成因性若爾執有隨界唐捐或應隨界無因而有若謂過去是展轉因此有虛言都無實義如何過去全無有體而可成立為展轉因智者應觀此盲朋黨於無體法倒執為因有體法中撥無因義若謂因過去非過去是因是則未來亦應同此如過去法體非有故非展轉因未來亦應體非有故非展轉果又展轉者是相續言不應此法即續於此既無去來唯有現在故應決定無展轉因然彼所説又應求彼二種異因由彼二因二俱起者此我已許謂我許心心所等法皆由前生自類因起及由俱起異類因生汝復於中何勞徵難是故上座都無有因能證定無俱生因義又彼所説唯一剎那有所依性及諸行法有俱生因皆難可了此非理説雖難可了而義非無如所依性謂所依性一剎那中雖難可了而心心所非無所依剎那眼等又諸業果一剎那頃雖難可了感起非無此俱生因亦應如是然後具壽諸所發言皆非善説違教理故由此決定有俱生因故俱有因理極成立
